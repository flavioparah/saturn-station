<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIMEWAYS - Painel de Calibração</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #22d3ee;
            --neon-gold: #fbbf24;
            --metal-base: #1e293b;
            --hologram-bg: rgba(8, 47, 73, 0.85);
            --pda-yellow: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background: #0f172a; color: white;
            font-family: 'Orbitron', sans-serif; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        #pda-wall-mount {
            position: relative;
            width: 95vw; max-width: 520px;
            background: var(--metal-base);
            padding: 40px 25px;
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 2px 2px 5px rgba(255,255,255,0.1), inset -2px -2px 5px rgba(0,0,0,0.5);
            border: 1px solid #0f172a;
        }

        .screw {
            position: absolute; width: 12px; height: 12px;
            background: #475569; border-radius: 50%;
            box-shadow: inset 2px 2px 3px rgba(0,0,0,0.8), 1px 1px 2px rgba(255,255,255,0.1);
        }
        .tl { top: 15px; left: 15px; } .tr { top: 15px; right: 15px; }
        .bl { bottom: 15px; left: 15px; } .br { bottom: 15px; right: 15px; }

        #screen-slot {
            background: #000; padding: 15px; border-radius: 4px;
            box-shadow: inset 5px 5px 15px rgba(0,0,0,1), 0 0 15px rgba(34, 211, 238, 0.1);
            border: 2px solid #0f172a; position: relative;
        }

        #hologram {
            background: var(--hologram-bg); border: 1px solid rgba(34, 211, 238, 0.3);
            position: relative; padding: 20px; overflow: hidden;
        }

        .hazard-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: repeating-linear-gradient(45deg, var(--pda-yellow), var(--pda-yellow) 10px, #000 10px, #000 20px);
            opacity: 0.7;
        }

        .header { display: flex; justify-content: space-between; margin-bottom: 5px; z-index: 2; position: relative; }
        .title-group h1 { font-size: 10px; margin: 0; color: var(--neon-cyan); letter-spacing: 2px; }
        .title-group .sub { font-family: 'Rajdhani'; font-size: 18px; font-weight: 700; color: #fff; }

        #phase-indicator {
            font-family: 'Rajdhani'; font-size: 12px; color: var(--pda-yellow);
            letter-spacing: 2px; text-align: right;
        }

        #top-feedback-zone {
            margin-bottom: 20px;
            z-index: 2;
            position: relative;
        }

        #status-bar {
            padding: 4px; background: rgba(0,0,0,0.4);
            font-family: 'Rajdhani'; font-size: 11px; color: #ef4444; text-align: center;
            min-height: 22px; text-transform: uppercase; letter-spacing: 1px;
        }

        #progress-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 0 0 4px 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            border-top: none;
        }
        #progress-bar { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, #0891b2, var(--neon-cyan)); 
            transition: width 0.1s linear; 
        }

        canvas {
            width: 100%; height: 160px; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(34, 211, 238, 0.2); margin-bottom: 20px; display: block;
        }

        .controls { display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 2; }
        .control-label {
            display: flex; justify-content: space-between;
            font-family: 'Rajdhani'; font-size: 11px; color: var(--neon-gold);
            font-weight: 700; letter-spacing: 1px;
        }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; padding: 10px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: rgba(251, 191, 36, 0.3); }
        input[type=range]::-webkit-slider-thumb {
            height: 30px; width: 50px; background: var(--pda-yellow);
            -webkit-appearance: none; margin-top: -14px; border-radius: 2px;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .success-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center; padding: 20px;
        }
        .success-overlay.active { transform: translateY(0); }
        
        .btn-next {
            margin-top: 30px; 
            background: var(--neon-cyan); 
            color: #000; 
            border: none; 
            padding: 12px 25px; 
            font-family: 'Orbitron'; 
            font-size: 10px; 
            font-weight: 900;
            cursor: pointer; 
            transition: 0.3s;
            letter-spacing: 1px;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .btn-next:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }
        
        #audio-hint { position: fixed; bottom: 10px; font-size: 9px; color: var(--neon-cyan); opacity: 0.5; }
    </style>
</head>
<body>

<div id="pda-wall-mount">
    <div class="screw tl"></div><div class="screw tr"></div>
    <div class="screw bl"></div><div class="screw br"></div>

    <div id="screen-slot">
        <div id="hologram">
            <div class="hazard-bar"></div>
            
            <div class="header">
                <div class="title-group">
                    <h1>SISTEMA DE ANTENA SETOR-07</h1>
                    <div class="sub">CALIBRAÇÃO ATIVA</div>
                </div>
                <div id="phase-indicator">FASE 1/3</div>
            </div>

            <div id="top-feedback-zone">
                <div id="status-bar">STATUS: AGUARDANDO SINCRONIA</div>
                <div id="progress-container"><div id="progress-bar"></div></div>
            </div>

            <canvas id="scope"></canvas>

            <div class="controls">
                <div class="control-group">
                    <div class="control-label"><span>MODULAÇÃO_FREQ</span><span id="val-freq">--</span></div>
                    <input type="range" id="freq" min="0.5" max="3.5" step="0.01" value="1.0">
                </div>
                <div class="control-group">
                    <div class="control-label"><span>OFFSET_FASE</span><span id="val-phase" style="font-variant-numeric: tabular-nums;">--</span></div>
                    <input type="range" id="phase" min="0" max="6.28" step="0.01" value="0">
                </div>
            </div>

            <div class="success-overlay" id="overlay">
                <div style="font-size: 40px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--neon-cyan));">📡</div>
                <h2 style="color:var(--neon-gold); font-size:16px; letter-spacing:2px; margin-bottom: 10px;">CONEXÃO COM A TERRA ESTABILIZADA</h2>
                <p id="sub-msg" style="font-family:'Rajdhani'; font-size:13px; color:#ef4444; margin-top:5px; font-weight: bold; letter-spacing: 1px; opacity: 0;">SEM RESPOSTA DO COMANDO TERRESTRE...</p>
                
                <!-- BOTÃO DE TRANSIÇÃO -->
                <button onclick="goToNextFile()" class="btn-next">ACESSAR LOGS DE TRANSMISSÃO</button>
            </div>
        </div>
    </div>
</div>

<div id="audio-hint">TOQUE PARA ATIVAR SISTEMAS DE ÁUDIO</div>

<script>
    // --- COLE SEU LINK DO GITHUB OU ARQUIVO HTML AQUI ---
    const NEXT_FILE_PATH = "estaleiro.html"; 
    // Exemplo: "proxima-fase.html" ou uma URL completa.

    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status-bar');
    const overlay = document.getElementById('overlay');
    const phaseLabel = document.getElementById('phase-indicator');
    const progressBar = document.getElementById('progress-bar');

    let currentPhaseIdx = 0;
    const phases = [
        { name: "SINAL ESTÁTICO", drift: 0, holdTime: 1200, decay: 3.5 },
        { name: "SINAL EM MOVIMENTO LENTO", drift: 0.005, holdTime: 1800, decay: 2.8 },
        { name: "SINAL OSCILANTE", drift: 0.01, holdTime: 2500, decay: 2.2 }
    ];

    let audioCtx = null;
    let oscMain, oscSync, gainMain, gainSync, noiseGain;

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        oscMain = audioCtx.createOscillator();
        oscMain.type = 'sine';
        gainMain = audioCtx.createGain();
        gainMain.gain.value = 0;
        
        oscSync = audioCtx.createOscillator();
        oscSync.type = 'triangle';
        gainSync = audioCtx.createGain();
        gainSync.gain.value = 0;

        const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
        const noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        noiseSource.loop = true;
        noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.05;

        oscMain.connect(gainMain);
        oscSync.connect(gainSync);
        noiseSource.connect(noiseGain);
        
        gainMain.connect(audioCtx.destination);
        gainSync.connect(audioCtx.destination);
        noiseGain.connect(audioCtx.destination);

        oscMain.start();
        oscSync.start();
        noiseSource.start();
        
        document.getElementById('audio-hint').style.display = 'none';
    }

    function playPhaseSuccess() {
        if (!audioCtx) return;
        const sweep = audioCtx.createOscillator();
        const sweepGain = audioCtx.createGain();
        sweep.type = 'sine';
        sweep.frequency.setValueAtTime(200, audioCtx.currentTime);
        sweep.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
        sweepGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        sweepGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        sweep.connect(sweepGain);
        sweepGain.connect(audioCtx.destination);
        sweep.start();
        sweep.stop(audioCtx.currentTime + 0.5);
    }

    let target = { freq: 1.5, phase: 1.5 };
    function randomizeTarget() {
        target.freq = (Math.random() * 1.5 + 1);
        target.phase = (Math.random() * 6);
    }
    randomizeTarget();

    let time = 0;
    let holdTimer = 0;
    let isTransitioning = false;
    let gameEnded = false;

    function resize() {
        canvas.width = canvas.offsetWidth * window.devicePixelRatio;
        canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const midY = canvas.height / 2;
        const amp = canvas.height * 0.28;
        const scale = 0.02;
        const config = phases[currentPhaseIdx];

        if (!gameEnded && config.drift > 0) target.phase += config.drift;

        // Onda Alvo
        ctx.beginPath();
        ctx.setLineDash([12, 6]);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
        ctx.lineWidth = 3;
        for(let x=0; x<canvas.width; x++) {
            const ampMod = currentPhaseIdx === 2 ? Math.sin(time * 0.5) * 5 : 0;
            const y = midY + Math.sin(x * scale * target.freq + target.phase) * (amp + ampMod);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        // Onda Jogador
        const playerFreq = parseFloat(document.getElementById('freq').value);
        const playerPhase = parseFloat(document.getElementById('phase').value);
        document.getElementById('val-freq').innerText = playerFreq.toFixed(2) + " Hz";
        document.getElementById('val-phase').innerText = playerPhase.toFixed(2) + " Rad";

        const dFreq = Math.abs(playerFreq - target.freq);
        const dPhase = Math.abs((playerPhase % 6.28) - (target.phase % 6.28));
        const dPhaseCirc = Math.min(dPhase, Math.abs(dPhase - 6.28));
        const error = dFreq + dPhaseCirc;

        if (audioCtx && !gameEnded) {
            noiseGain.gain.setTargetAtTime(Math.min(0.15, error * 0.05), audioCtx.currentTime, 0.1);
            const proximity = 1 - Math.min(1, error / 2);
            oscMain.frequency.setTargetAtTime(100 + (proximity * 300), audioCtx.currentTime, 0.1);
            gainMain.gain.setTargetAtTime(0.05 + (proximity * 0.05), audioCtx.currentTime, 0.1);

            if (error < 0.6) {
                oscSync.frequency.setTargetAtTime(440, audioCtx.currentTime, 0.1);
                gainSync.gain.setTargetAtTime((0.6 - error) * 0.2, audioCtx.currentTime, 0.1);
            } else {
                gainSync.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }
        }

        ctx.beginPath();
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--neon-gold');
        ctx.lineWidth = 4;
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.strokeStyle;
        for(let x=0; x<canvas.width; x++) {
            const noise = (Math.random() - 0.5) * (error * 3);
            const y = midY + Math.sin(x * scale * playerFreq + playerPhase + Math.sin(time) * 0.04) * amp + noise;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        if (!isTransitioning && !gameEnded) {
            if (dFreq < 0.35 && dPhaseCirc < 0.5) {
                holdTimer += 16.6; 
                status.innerText = `SINCRONIZANDO: ${Math.min(100, Math.floor((holdTimer/config.holdTime)*100))}%`;
                status.style.color = "#22c55e";
                if (holdTimer >= config.holdTime) nextPhase();
            } else {
                if (holdTimer > 0) {
                    holdTimer -= config.decay; 
                    status.innerText = "SINAL INSTÁVEL - RECALIBRANDO...";
                    status.style.color = "#f87171";
                } else {
                    status.innerText = `FASE ${currentPhaseIdx+1}: ${config.name}`;
                    status.style.color = error < 1 ? "var(--neon-gold)" : "#ef4444";
                }
            }
            progressBar.style.width = `${(holdTimer/config.holdTime)*100}%`;
        }

        time += 0.05;
        requestAnimationFrame(draw);
    }

    function nextPhase() {
        isTransitioning = true;
        holdTimer = 0;
        progressBar.style.width = '0%';
        playPhaseSuccess();
        
        if (currentPhaseIdx < phases.length - 1) {
            currentPhaseIdx++;
            phaseLabel.innerText = `FASE ${currentPhaseIdx + 1}/3`;
            status.innerText = "BUSCANDO PRÓXIMA CAMADA...";
            status.style.color = "var(--neon-cyan)";
            setTimeout(() => {
                randomizeTarget();
                isTransitioning = false;
            }, 1200);
        } else {
            endGame();
        }
    }

    function endGame() {
        gameEnded = true;
        overlay.classList.add('active');
        status.innerText = "SISTEMA BLOQUEADO - SEM RESPOSTA";
        status.style.color = "#ef4444";
        
        if (audioCtx) {
            noiseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
            gainMain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
            oscSync.frequency.setTargetAtTime(440, audioCtx.currentTime, 0.1);
            gainSync.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainSync.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 15);
        }

        setTimeout(() => {
            document.getElementById('sub-msg').style.transition = "opacity 2s";
            document.getElementById('sub-msg').style.opacity = "1";
        }, 1000);
    }

    // Função de Redirecionamento
    function goToNextFile() {
        // Se o link for apenas um arquivo local no mesmo repositório do github pages:
        window.location.href = NEXT_FILE_PATH;
    }

    const inputs = document.querySelectorAll('input');
    inputs.forEach(i => i.addEventListener('input', () => { if(!gameEnded) initAudio(); }));
    document.body.onclick = () => { if(!gameEnded) initAudio(); };
    draw();
</script>
</body>
</html>
