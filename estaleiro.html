<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIMEWAYS - Estaleiro Industrial V4</title>
    <style>
        :root {
            --neon-cyan: #22d3ee;
            --neon-gold: #fbbf24;
            --bg: #010409; 
            --panel: rgba(13, 17, 23, 0.98);
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #stage { 
            position: relative; 
            width: 100vw; height: 100vh; 
            background: #000;
        }

        canvas { display: block; position: absolute; inset: 0; z-index: 5; }

        #ui-overlay {
            position: absolute; inset: 0; z-index: 100;
            pointer-events: none; padding: 40px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .header {
            border-left: 3px solid var(--neon-gold);
            padding-left: 25px;
            animation: slideIn 1s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 5px; color: var(--neon-cyan); opacity: 0.8; }
        .value { font-weight: 900; font-size: 26px; color: #fff; text-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }

        #module-card {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -190%) scale(0.9);
            width: 320px;
            background: var(--panel);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 24px;
            text-align: center;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            clip-path: polygon(0 0, 85% 0, 100% 15%, 100% 100%, 15% 100%, 0 85%);
        }
        #module-card.visible { opacity: 1; transform: translate(-50%, -210%) scale(1); }

        .mod-name { font-size: 16px; font-weight: 900; color: var(--neon-gold); margin-bottom: 8px; letter-spacing: 2px; }
        .mod-desc { font-size: 11px; color: #94a3b8; line-height: 1.6; font-family: 'Rajdhani', sans-serif; }

        .controls-container {
            position: absolute; 
            bottom: 60px; 
            left: 0;
            width: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 30px;
            pointer-events: auto;
            z-index: 100;
        }
        
        .nav-btn {
            width: 70px; 
            height: 70px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 50%; 
            color: var(--neon-gold);
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 24px; 
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .nav-btn:active { background: var(--neon-gold); color: black; box-shadow: 0 0 20px var(--neon-gold); }

        #action-btn {
            width: 110px;
            height: 110px;
            background: var(--neon-gold);
            color: #000; 
            border: none;
            border-radius: 50%; 
            font-weight: 900;
            font-size: 10px; 
            cursor: pointer;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
            opacity: 0;
            line-height: 1.2;
            text-align: center;
            flex-shrink: 0;
        }
        #action-btn.active { transform: scale(1); opacity: 1; }

        .stats { position: absolute; bottom: 30px; left: 45px; font-size: 11px; color: var(--neon-cyan); letter-spacing: 2px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="stage">
    <canvas id="game"></canvas>

    <div id="ui-overlay">
        <div class="header">
            <div class="label">ESTALEIRO ESPACIAL</div>
            <div class="value">SETOR DE MANUTENÇÃO 07</div>
        </div>

        <div id="module-card">
            <div class="mod-name" id="m-title">SISTEMA</div>
            <div class="mod-desc" id="m-desc">Aguardando telemetria...</div>
        </div>

        <div class="controls-container">
            <div id="btn-left" class="nav-btn">◀</div>
            <button id="action-btn">INTERAGIR</button>
            <div id="btn-right" class="nav-btn">▶</div>
        </div>
    </div>

    <div class="stats" id="debug">SYSTEM: ACTIVE // GRAVITY: 0.1G</div>
</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const mCard = document.getElementById('module-card');
    const mTitle = document.getElementById('m-title');
    const mDesc = document.getElementById('m-desc');
    const actBtn = document.getElementById('action-btn');

    let w, h, cx, cy, ringRadius, ringWidth;
    let playerAngle = 0;
    let stationRot = 0;
    let playerVel = 0;
    let input = 0;
    let time = 0;
    let stars = [];
    let doorOpenState = 0; // 0 a 1 para animação da porta

    const modules = [
        { angle: 0, name: "ESCOTILHA DE ACESSO", desc: "Porta blindada de retorno ao núcleo central. Protocolo de pressurização ativo.", color: "#fbbf24", type: "airlock" },
        { angle: Math.PI/3, name: "ANTENA DE LONGO ALCANCE", desc: "Comunicação quântica inter-setorial ativa.", color: "#22d3ee", type: "antenna" },
        { angle: (Math.PI/3)*2, name: "UNIDADE DE ARMAZENAMENTO", desc: "Container industrial reforçado com travas magnéticas.", color: "#94a3b8", type: "cargo" },
        { angle: Math.PI, name: "PONTO DE ACOPLAGEM", desc: "Estrutura de suporte para naves visitantes.", color: "#fbbf24", type: "dock" },
        { angle: (Math.PI/3)*4, name: "MATRIZ DE SENSORES", desc: "Varredura térmica e detecção de radiação gama.", color: "#ef4444", type: "sensor" },
        { angle: (Math.PI/3)*5, name: "BOBINA DE ENERGIA", desc: "Distribuidor de carga para sistemas externos.", color: "#22d3ee", type: "coil" }
    ];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        cx = w / 2; cy = h / 2;
        
        ringRadius = Math.min(w, h) * 0.25; 
        ringWidth = ringRadius * 0.65;

        // Aumentado: 400 estrelas para um fundo mais denso
        if(stars.length === 0) {
            for(let i=0; i<400; i++) {
                stars.push({
                    x: Math.random() * 3000 - 1500,
                    y: Math.random() * 3000 - 1500,
                    s: Math.random() * 1.5 + 0.5,
                    o: Math.random(),
                    p: Math.random() * 0.5 + 0.5 // fator de profundidade/paralaxe
                });
            }
        }
    }

    const setInput = (id, val) => {
        const el = document.getElementById(id);
        const start = (e) => { e.preventDefault(); input = val; };
        const end = () => input = 0;
        el.addEventListener('mousedown', start); el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
    };
    setInput('btn-left', 0.0012); 
    setInput('btn-right', -0.0012);

    function drawStars() {
        ctx.save();
        ctx.translate(cx, cy);
        // O fundo gira com base na rotação da estação mas com velocidade de paralaxe
        stars.forEach(s => {
            ctx.save();
            ctx.rotate(stationRot * s.p * 0.5); 
            ctx.fillStyle = `rgba(255, 255, 255, ${s.o * (0.3 + Math.sin(time + s.x)*0.7)})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        });
        ctx.restore();
    }

    function drawModule(m, isActive) {
        ctx.save();
        ctx.rotate(m.angle);
        const outer = ringRadius + ringWidth/2;
        const inner = ringRadius - ringWidth/2;
        ctx.lineWidth = 2;
        ctx.strokeStyle = m.color;

        if(m.type === "airlock") {
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(outer - 8, -45, 20, 90);
            ctx.strokeStyle = "#475569";
            ctx.strokeRect(outer - 8, -45, 20, 90);

            if(isActive) doorOpenState = Math.min(1, doorOpenState + 0.05);
            else doorOpenState = Math.max(0, doorOpenState - 0.05);

            const doorOffset = doorOpenState * 35;

            ctx.fillStyle = "#fbbf24";
            ctx.fillRect(outer - 5, -40 - doorOffset, 15, 40);
            ctx.fillRect(outer - 5, 0 + doorOffset, 15, 40);

            ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
            for(let i = 0; i < 4; i++) {
                ctx.beginPath(); ctx.moveTo(outer-5, -35 - doorOffset + i*8); ctx.lineTo(outer+10, -30 - doorOffset + i*8); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(outer-5, 5 + doorOffset + i*8); ctx.lineTo(outer+10, 10 + doorOffset + i*8); ctx.stroke();
            }

            ctx.fillStyle = isActive ? "#22c55e" : "#ef4444";
            ctx.beginPath(); ctx.arc(outer + 12, -40, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(outer + 12, 40, 3, 0, Math.PI*2); ctx.fill();

        } else if(m.type === "antenna") {
            ctx.beginPath(); ctx.moveTo(outer, 0); ctx.lineTo(outer+50, 0); ctx.stroke();
            ctx.beginPath(); ctx.arc(outer+55, 0, 15, -1, 1); ctx.stroke();
            ctx.fillStyle = m.color;
            if(Math.sin(time*10)>0) ctx.fillRect(outer+65, -2, 4, 4);
        } else if(m.type === "cargo") {
            ctx.strokeRect(outer+5, -25, 35, 50);
            ctx.beginPath(); ctx.moveTo(outer+5, -5); ctx.lineTo(outer+40, -5); ctx.stroke();
            ctx.fillStyle = m.color; ctx.globalAlpha = 0.3;
            ctx.fillRect(outer+10, -20, 10, 10);
        } else if(m.type === "sensor") {
            ctx.strokeRect(outer, -15, 20, 30);
            ctx.beginPath(); ctx.arc(outer+30, 0, 8, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(outer+30, 0, 3, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.strokeRect(outer, -10, 30, 20);
            ctx.beginPath(); ctx.moveTo(outer+30, 0); ctx.lineTo(outer+45, 0); ctx.stroke();
        }
        ctx.restore();

        const pAng = (playerAngle % (Math.PI*2) + (Math.PI*2)) % (Math.PI*2);
        const diff = Math.abs(pAng - m.angle);
        return diff < 0.15 || diff > (Math.PI*2 - 0.15);
    }

    function drawAstronaut(t, vel) {
        ctx.save();
        const moving = Math.abs(vel) > 0.0005;
        const animSpeed = 12;
        const walkPhase = moving ? Math.sin(t * animSpeed) : 0;
        
        if (vel < -0.0001) ctx.scale(1, 1);
        else if (vel > 0.0001) ctx.scale(-1, 1);
        
        const s = (ringRadius / 220); 
        ctx.scale(s, s);
        
        const white = "#ffffff";
        const bodyGrey = "#cbd5e1";
        const helmetDark = "#0f172a";
        const gold = "#fbbf24";
        
        ctx.save();
        ctx.translate(-5.5, -2);
        ctx.rotate(moving ? walkPhase * 0.6 : 0);
        ctx.fillStyle = bodyGrey;
        ctx.beginPath(); ctx.roundRect(-4.4, 0, 8.8, 17.6, [1, 1, 4, 4]); ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.translate(5.5, -2);
        ctx.rotate(moving ? -walkPhase * 0.6 : 0);
        ctx.fillStyle = white;
        ctx.beginPath(); ctx.roundRect(-4.4, 0, 8.8, 17.6, [1, 1, 4, 4]); ctx.fill();
        ctx.restore();

        ctx.save();
        const bounce = moving ? Math.abs(Math.sin(t * animSpeed)) * 1.5 : 0;
        ctx.translate(0, -bounce - 2);
        
        ctx.fillStyle = "#334155";
        ctx.beginPath(); ctx.roundRect(-14, -28, 10, 24, 4); ctx.fill();
        
        ctx.fillStyle = white;
        ctx.beginPath(); ctx.roundRect(-12, -32, 24, 32, [8, 8, 4, 4]); ctx.fill();
        
        ctx.fillStyle = gold;
        ctx.globalAlpha = 0.5 + Math.sin(t*5)*0.5;
        ctx.fillRect(-5, -22, 10, 2);
        ctx.globalAlpha = 1;

        ctx.save();
        ctx.translate(-10, -25);
        ctx.rotate(moving ? -walkPhase * 0.8 : 0.2);
        ctx.fillStyle = bodyGrey;
        ctx.beginPath(); ctx.roundRect(-3.3, 0, 6.6, 19.8, 4); ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.translate(10, -25);
        ctx.rotate(moving ? walkPhase * 0.8 : -0.2);
        ctx.fillStyle = white;
        ctx.beginPath(); ctx.roundRect(-3.3, 0, 6.6, 19.8, 4); ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.translate(0, -38);
        ctx.fillStyle = white;
        ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = helmetDark;
        ctx.beginPath(); ctx.ellipse(4, -1, 11, 8, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore(); 
        
        ctx.restore(); 
        ctx.restore(); 
    }

    function loop() {
        resize();
        time += 0.016;
        // Aumentado: rotação da estação agora é mais rápida (era 0.0003)
        stationRot += 0.001;
        
        playerVel += input;
        playerVel *= 0.85; 
        playerAngle += playerVel;

        ctx.clearRect(0, 0, w, h);
        drawStars();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(stationRot);

        const ringG = ctx.createRadialGradient(0,0, ringRadius-ringWidth/2, 0,0, ringRadius+ringWidth/2);
        ringG.addColorStop(0, "#080c14");
        ringG.addColorStop(0.3, "#1e293b");
        ringG.addColorStop(0.7, "#1e293b");
        ringG.addColorStop(1, "#080c14");

        ctx.beginPath();
        ctx.arc(0, 0, ringRadius, 0, Math.PI*2);
        ctx.lineWidth = ringWidth;
        ctx.strokeStyle = ringG;
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1.5;
        for(let i=0; i<32; i++) {
            ctx.save();
            ctx.rotate(i * (Math.PI/16));
            ctx.beginPath();
            ctx.moveTo(ringRadius - ringWidth/2, 0);
            ctx.lineTo(ringRadius + ringWidth/2, 0);
            ctx.stroke();
            ctx.restore();
        }

        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(34, 211, 238, 0.4)";
        ctx.beginPath(); ctx.arc(0, 0, ringRadius + ringWidth/2, 0, Math.PI*2); ctx.stroke();
        ctx.strokeStyle = "rgba(251, 191, 36, 0.2)";
        ctx.beginPath(); ctx.arc(0, 0, ringRadius - ringWidth/2, 0, Math.PI*2); ctx.stroke();

        let activeMod = null;
        modules.forEach(m => { 
            const pAng = (playerAngle % (Math.PI*2) + (Math.PI*2)) % (Math.PI*2);
            const diff = Math.abs(pAng - m.angle);
            const isNowActive = diff < 0.15 || diff > (Math.PI*2 - 0.15);
            if(isNowActive) activeMod = m;
            drawModule(m, isNowActive); 
        });

        ctx.save();
        ctx.rotate(playerAngle);
        ctx.translate(ringRadius, 0);
        ctx.rotate(-Math.PI/2);
        drawAstronaut(time, playerVel);
        ctx.restore();

        ctx.restore();

        if(activeMod) {
            mTitle.innerText = activeMod.name;
            mDesc.innerText = activeMod.desc;
            mCard.classList.add('visible');
            actBtn.classList.add('active');
            actBtn.style.background = activeMod.color;
            actBtn.style.boxShadow = `0 0 30px ${activeMod.color}66`;
            if(activeMod.type === "airlock") actBtn.innerHTML = "<b>ACESSAR<br>HANGAR</b>";
            else actBtn.innerHTML = "<b>INSPECIONAR<br>MÓDULO</b>";
        } else {
            mCard.classList.remove('visible');
            actBtn.classList.remove('active');
        }

        requestAnimationFrame(loop);
    }

    window.onload = loop;
</script>

</body>
</html>
