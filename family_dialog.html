<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTAÇÃO ÓRION - TERMINAL CORE</title>
    <!-- Bibliotecas de Renderização 3D e Fontes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #22d3ee;
            --neon-green: #22ee5b;
            --steel-dark: #0f1215;
            --steel-light: #2c343a;
            --red-alert: #ff1f1f;
            --panel-bg: #15191d;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000;
            font-family: 'Rajdhani', sans-serif;
        }

        /* FUNDO AMBIENTE */
        .ambient-background {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, var(--steel-light) 0%, var(--steel-dark) 100%);
            z-index: 1;
            transition: background 0.8s ease;
        }

        /* MOLDURA DO MONITOR */
        .monitor-frame {
            position: absolute; top: 2%; left: 50%;
            transform: translateX(-50%);
            width: 94vw; 
            height: 75vh; 
            background: var(--panel-bg);
            border: 8px solid #1a1a1a;
            border-bottom-width: 45px; 
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 5; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .red-alert-active .monitor-frame {
            border-color: #3a0a0a;
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.2);
        }

        /* CONTEÚDO DO CHAT */
        #screen-chat {
            flex: 1; display: flex; flex-direction: column; background: #05070a;
            position: relative; z-index: 10;
        }

        .chat-content {
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
            padding-bottom: 20px; scroll-behavior: smooth;
        }

        /* ESTILIZAÇÃO DAS MENSAGENS */
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 4px; font-size: 13px; animation: fadeIn 0.3s ease; }
        .in { align-self: flex-start; background: rgba(34, 211, 238, 0.05); color: #b0bfc6; border-left: 2px solid var(--neon-blue); }
        .out { align-self: flex-end; background: rgba(34, 211, 238, 0.1); color: #fff; border-right: 2px solid var(--neon-blue); }
        
        .sys { align-self: center; background: rgba(255,0,0,0.1); color: var(--red-alert); font-family: 'Share Tech Mono'; font-size: 10px; border: 1px solid rgba(255,0,0,0.3); text-align: center; width: 90%; }
        
        .sys-success { align-self: center; background: rgba(34, 238, 91, 0.05); color: var(--neon-green); font-family: 'Share Tech Mono'; font-size: 10px; border: 1px solid rgba(34, 238, 91, 0.3); text-align: center; width: 90%; }

        /* TELA DE ERRO FINAL */
        #error-screen {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: var(--red-alert); text-align: center; font-family: 'Share Tech Mono'; padding: 20px;
        }

        /* CAPACETE 3D */
        #helmet-canvas-container { 
            position: fixed; 
            bottom: -50px; 
            left: 0; 
            width: 100%; 
            height: 50vh; 
            z-index: 100; 
            pointer-events: none; 
        }

        /* BOTÃO TRANSMITIR */
        .action-btn {
            position: absolute; 
            bottom: 6px; 
            right: 15px;
            background: transparent; 
            color: var(--neon-blue); 
            border: 1.5px solid var(--neon-blue);
            padding: 6px 18px; 
            font-family: 'Share Tech Mono'; 
            font-size: 12px;
            font-weight: bold;
            cursor: pointer; 
            border-radius: 4px; 
            z-index: 1001; 
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .action-btn:hover {
            background: rgba(34, 211, 238, 0.15);
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
        }

        /* BOTÃO FINAL */
        .next-scene-btn {
            background: transparent; 
            color: var(--red-alert); 
            border: 2px solid var(--red-alert);
            padding: 12px 30px; 
            font-family: 'Share Tech Mono'; 
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer; 
            border-radius: 4px; 
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(255, 31, 31, 0.3);
            transition: all 0.3s ease;
        }
        
        .next-scene-btn:hover {
            box-shadow: 0 0 20px rgba(255, 31, 31, 0.6);
            background: rgba(255, 31, 31, 0.05);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="main-body">

<div class="ambient-background"></div>

<div class="monitor-frame">
    <!-- Tela de Erro Final -->
    <div id="error-screen">
        <h2 style="letter-spacing: 5px; margin-bottom: 5px;">SINAL PERDIDO</h2>
        <p style="opacity: 0.6; font-size: 11px;">FALHA CRÍTICA DE TRANSMISSÃO // ÓRION-CORE</p>
        
        <button id="final-btn" class="next-scene-btn" onclick="handleNextNarrative()">
            Avançar
        </button>
    </div>

    <!-- Interface de Chat -->
    <div id="screen-chat">
        <div style="background: #0a0a0a; padding: 12px; border-bottom: 1px solid #222; color: var(--neon-blue); font-family: 'Share Tech Mono'; font-size: 11px; display: flex; justify-content: space-between;">
            <span>LINK: TERRA_SETOR_07</span>
            <span id="st-clock">ST-00:00</span>
        </div>
        <div class="chat-content" id="chat-box">
            <div class="msg sys-success">INICIALIZANDO PROTOCOLO DE COMUNICAÇÃO FAMILIAR...</div>
        </div>
    </div>

    <!-- Container do Planeta -->
    <div id="planet-canvas-container" style="position: absolute; inset: 0; z-index: 5; display: none;"></div>

    <!-- Barra de Status -->
    <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 45px; background: #0a0a0a; border-top: 1px solid #222; z-index: 100; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;">
        <div id="status-led" style="width: 8px; height: 8px; border-radius: 50%; background: var(--neon-blue); margin-right: 12px;"></div>
        <span id="status-text" style="color: var(--neon-blue); font-size: 10px; font-family: 'Share Tech Mono'; letter-spacing: 1px;">SINAL ESTÁVEL</span>
    </div>

    <button id="main-action-btn" class="action-btn" onclick="nextStep()">Transmitir</button>
</div>

<div id="helmet-canvas-container"></div>

<script>
    // --- ENGINE DE ÁUDIO ---
    const AudioEngine = {
        ctx: null,
        init() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.playStaticNoise();
            }
        },
        playBeep(freq = 800, duration = 0.1, type = 'square', vol = 0.1) {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playAlert() {
            this.playBeep(150, 0.3, 'sawtooth', 0.15);
            setTimeout(() => this.playBeep(100, 0.4, 'sawtooth', 0.15), 100);
        },
        playPanicAlarm() {
            const playPulse = () => {
                if (!isPanicMode) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.8);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.8);
                setTimeout(playPulse, 1000);
            };
            playPulse();
        },
        playStaticNoise() {
            const bufferSize = 2 * this.ctx.sampleRate,
                noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate),
                output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            const whiteNoise = this.ctx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            const gain = this.ctx.createGain();
            gain.gain.value = 0.02;
            whiteNoise.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            whiteNoise.start();
        }
    };

    let hScene, hCamera, hRenderer, helmet, hGlobalLight, hAmbient;
    let pScene, pCamera, pRenderer, earth, cityLights = [];
    let isPanicMode = false;
    let currentStep = -1;

    const story = [
        { type: 'out', user: 'John', text: 'Acabei de acoplar. O silêncio aqui é ensurdecedor...' },
        { type: 'in', user: 'Sofia', text: 'John! Que alívio. A Luna quer te dar um oi.' },
        { type: 'in', user: 'Sofia', text: '(Luna): Papai! Viu as estrelas?' },
        { type: 'out', user: 'John', text: 'Oi querida! Logo o papai volta, prometo.' },
        { type: 'in', user: 'Sofia', text: 'As luzes da cidade estão falhando. Parece um apagão gigante.' },
        { type: 'sys', text: 'AVISO: INTERFERÊNCIA ATMOSFÉRICA DETECTADA' },
        { type: 'in', user: 'Sofia', text: 'Está tudo ficando preto lá fora! Eu te amo!' },
        { type: 'sys', text: 'ERRO: SINAL TERRESTRE INTERROMPIDO' }
    ];

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('error-screen').style.display === 'flex') handleNextNarrative();
            else if (!document.getElementById('main-action-btn').disabled) nextStep();
        }
    });

    // =========================================================================
    // LOCAL PARA COLAR O ARQUIVO HTML DA PRÓXIMA CENA
    // =========================================================================
    function handleNextNarrative() {
        AudioEngine.playBeep(600, 0.1, 'sine', 0.2);
        
        // 1. Se você quer ir para outro arquivo HTML, cole o nome dele abaixo:
        window.location.href = "PROXIMA_CENA.html"; 
        
        // Substitua "PROXIMA_CENA.html" pelo nome exato do arquivo que você criou.
        // Se for um link externo, coloque o endereço completo (ex: "https://...")
    }
    // =========================================================================

    function initHelmet() {
        const container = document.getElementById('helmet-canvas-container');
        hScene = new THREE.Scene();
        hCamera = new THREE.PerspectiveCamera(42, container.offsetWidth / container.offsetHeight, 0.1, 1000);
        hRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        hRenderer.setSize(container.offsetWidth, container.offsetHeight);
        container.appendChild(hRenderer.domElement);
        const group = new THREE.Group();
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.4, metalness: 0.1 });
        group.add(new THREE.Mesh(new THREE.SphereGeometry(3, 64, 64), whiteMat));
        const stripeMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x003366, roughness: 0.3 });
        const stripe = new THREE.Mesh(new THREE.TorusGeometry(3.02, 0.06, 16, 100), stripeMat);
        stripe.rotation.y = Math.PI / 2;
        group.add(stripe);
        const visorMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.05, metalness: 0.9 });
        const visor = new THREE.Mesh(new THREE.SphereGeometry(2.95, 64, 64, 0, Math.PI * 2, 0, Math.PI / 1.7), visorMat);
        visor.rotation.x = Math.PI / 2;
        group.add(visor);
        helmet = group;
        helmet.position.y = -3.8; 
        helmet.rotation.y = Math.PI; 
        hScene.add(helmet);
        hGlobalLight = new THREE.HemisphereLight(0xffffff, 0x333333, 1.2);
        hScene.add(hGlobalLight);
        hAmbient = new THREE.AmbientLight(0x22d3ee, 0.3);
        hScene.add(hAmbient);
        hCamera.position.z = 11;
        animateHelmet();
    }

    function animateHelmet() {
        requestAnimationFrame(animateHelmet);
        if(helmet) {
            const time = Date.now();
            if (!isPanicMode) {
                helmet.position.y = -3.8 + Math.sin(time * 0.001) * 0.05;
                helmet.rotation.y = Math.PI + Math.sin(time * 0.0005) * 0.04;
            } else {
                const timeSec = time * 0.001;
                helmet.rotation.y = Math.PI + Math.sin(timeSec * 15.0) * 0.4;
                helmet.position.y = -3.8 + Math.sin(timeSec * 20.0) * 0.08;
                const pulse = (Math.sin(time * 0.003) + 1) / 2;
                hGlobalLight.color.setRGB(1, 1 - pulse * 0.7, 1 - pulse * 0.7); 
                hGlobalLight.intensity = 0.8 + (pulse * 1.5);
                document.getElementById('main-body').style.backgroundColor = `rgba(${pulse * 35}, 0, 0, 1)`;
            }
        }
        hRenderer.render(hScene, hCamera);
    }

    function initEarth() {
        AudioEngine.playBeep(200, 0.5, 'sine', 0.2); 
        const container = document.getElementById('planet-canvas-container');
        container.style.display = 'block';
        pScene = new THREE.Scene();
        pCamera = new THREE.PerspectiveCamera(40, container.offsetWidth / container.offsetHeight, 0.1, 1000);
        pCamera.position.z = 13;
        pRenderer = new THREE.WebGLRenderer({ antialias: true });
        pRenderer.setSize(container.offsetWidth, container.offsetHeight);
        container.appendChild(pRenderer.domElement);
        earth = new THREE.Mesh(new THREE.SphereGeometry(5, 64, 64), new THREE.MeshPhongMaterial({ color: 0x010305, emissive: 0x020202, shininess: 5 }));
        pScene.add(earth);
        const lightMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
        for(let i=0; i<600; i++) {
            const light = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8), lightMat.clone());
            const phi = Math.random() * Math.PI, theta = Math.random() * Math.PI * 2, r = 5.02;
            light.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
            earth.add(light);
            cityLights.push(light);
        }
        pScene.add(new THREE.AmbientLight(0x22d3ee, 0.4));
        animateEarth();
    }

    function animateEarth() {
        requestAnimationFrame(animateEarth);
        if(earth) earth.rotation.y += 0.001;
        pRenderer.render(pScene, pCamera);
    }

    function startBlackout() {
        cityLights.sort(() => Math.random() - 0.5);
        let i = 0;
        const interval = setInterval(() => {
            if(i < cityLights.length) {
                AudioEngine.playBeep(100 + Math.random() * 50, 0.05, 'sawtooth', 0.02);
                for(let j=0; j<10 && i<cityLights.length; j++, i++) cityLights[i].visible = false;
            } else {
                clearInterval(interval);
                finishScene();
            }
        }, 40);
    }

    function finishScene() {
        setTimeout(() => {
            isPanicMode = true;
            AudioEngine.playPanicAlarm(); 
            document.getElementById('main-body').classList.add('red-alert-active');
            document.getElementById('status-led').style.background = 'var(--red-alert)';
            document.getElementById('status-text').innerText = 'SINAL PERDIDO';
            document.getElementById('status-text').style.color = 'var(--red-alert)';
            setTimeout(() => { document.getElementById('error-screen').style.display = 'flex'; }, 1000);
        }, 500);
    }

    function nextStep() {
        currentStep++;
        const btn = document.getElementById('main-action-btn'), chatBox = document.getElementById('chat-box');
        if (currentStep < story.length) {
            const m = story[currentStep];
            if (m.type === 'sys') AudioEngine.playAlert();
            else AudioEngine.playBeep(800 + (m.type === 'in' ? 200 : 0), 0.05, 'square', 0.05);
            const div = document.createElement('div');
            div.className = `msg ${m.type === 'sys' ? 'sys' : m.type}`;
            div.innerHTML = m.type !== 'sys' ? `<strong>${m.user}:</strong> ${m.text}` : m.text;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            if (currentStep === story.length - 1) btn.innerText = "Observar Terra";
        } else if (currentStep === story.length) {
            AudioEngine.playBeep(400, 0.2, 'sine', 0.1);
            document.getElementById('screen-chat').style.display = 'none';
            initEarth();
            btn.innerText = "Confirmar Link";
        } else {
            AudioEngine.playBeep(300, 0.3, 'sawtooth', 0.1);
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";
            startBlackout();
        }
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('st-clock').innerText = "ST-" + now.toTimeString().slice(0, 5);
    }, 1000);

    window.onload = () => {
        initHelmet();
        document.body.addEventListener('click', () => AudioEngine.init(), { once: true });
    };
</script>
</body>
</html>
