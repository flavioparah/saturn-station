<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIMEWAYS - Habitat A1</title>
    <style>
        :root {
            --neon: #4ade80;
            --neon-dim: rgba(74, 222, 128, 0.15);
            --bg: #010205;
            --panel: rgba(10, 20, 14, 0.92);
            --amber: #fbbf24;
            --cold: #7dd3fc;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #stage {
            position: relative;
            width: 100vw; height: 100vh;
            background: #000;
        }

        canvas { display: block; position: absolute; inset: 0; z-index: 5; }

        /* UI OVERLAY */
        #ui-top {
            position: absolute;
            top: 50px; left: 30px;
            border-left: 4px solid var(--neon);
            padding-left: 15px;
            z-index: 100;
            text-shadow: 0 0 10px var(--neon);
        }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; font-weight: 400; }
        .value { font-weight: 900; font-size: 18px; color: var(--neon); letter-spacing: 2px; }

        /* MOOD LOG - diário do John no canto */
        #mood-log {
            position: absolute;
            top: 50px; right: 30px;
            width: 180px;
            z-index: 100;
            text-align: right;
            opacity: 0;
            animation: fadeIn 3s ease 2s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .mood-line {
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            color: rgba(74, 222, 128, 0.5);
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.8;
        }

        #module-card {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 280px;
            text-align: center;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
            z-index: 10;
        }
        #module-card.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .mod-name {
            font-size: 16px; font-weight: 900;
            color: var(--neon); margin-bottom: 8px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--neon);
        }
        .mod-desc {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px; color: #94a3b8;
            line-height: 1.6; text-transform: uppercase; letter-spacing: 1px;
        }

        /* CONTROLS */
        .controls-container {
            position: absolute;
            bottom: 100px; left: 50%;
            transform: translateX(-50%);
            display: flex; justify-content: center; align-items: center;
            gap: 30px;
            pointer-events: auto; z-index: 100;
        }

        .nav-btn {
            width: 65px; height: 65px;
            background: rgba(10, 20, 14, 0.9);
            border: 1px solid rgba(74, 222, 128, 0.25);
            border-radius: 50%;
            color: var(--neon);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .nav-btn:active { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        #action-btn {
            width: 105px; height: 105px;
            background: var(--neon);
            color: #000; border: none;
            border-radius: 50%; font-weight: 900;
            font-size: 9px; cursor: pointer;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0); opacity: 0;
            line-height: 1.2; text-align: center; flex-shrink: 0;
        }
        #action-btn.active { transform: scale(1); opacity: 1; }

        /* MENSAGEM ATMOSFÉRICA flutuante */
        #atm-msg {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            color: rgba(74, 222, 128, 0.35);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            z-index: 100;
            animation: breathe 6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        #audio-hint {
            position: absolute; top: 20px; right: 20px;
            font-size: 9px; color: var(--neon); opacity: 0.4; z-index: 200;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="stage">
    <div id="audio-hint">CLIQUE PARA ATIVAR ÁUDIO</div>

    <canvas id="game"></canvas>

    <div id="ui-top">
        <div class="label">SATURN STATION // HABITAT A1</div>
        <div class="value">OCUPAÇÃO: 1/12</div>
    </div>

    <div id="mood-log">
        <div class="mood-line">DIA 3 PÓS-EVENTO</div>
        <div class="mood-line">TRIPULAÇÃO: AUSENTE</div>
        <div class="mood-line">TEMP: 18.4°C</div>
        <div class="mood-line">O2: 21.1%</div>
    </div>

    <div id="module-card">
        <div class="mod-name" id="m-title">—</div>
        <div class="mod-desc" id="m-desc">Aguardando...</div>
    </div>

    <div class="controls-container">
        <div id="btn-left" class="nav-btn">◀</div>
        <button id="action-btn">INTERAGIR</button>
        <div id="btn-right" class="nav-btn">▶</div>
    </div>

    <div id="atm-msg">SEM SINAL DE TRIPULAÇÃO ATIVA</div>
</div>

<script>
// ─── ÁUDIO PROCEDURAL ────────────────────────────────────────────────────────
class HabitatAudio {
    constructor() {
        this.ctx = null;
        this.initialized = false;
        this.ventGain = null;
        this.heartGain = null;
        this.echoGain = null;
    }

    init() {
        if (this.initialized) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this._setupVentilacao();
        this._setupEco();
        this.initialized = true;
        document.getElementById('audio-hint').style.display = 'none';
    }

    _setupVentilacao() {
        // Hum de ventilação — ruído branco filtrado, contínuo e suave
        const bufferSize = 3 * this.ctx.sampleRate;
        const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        const noise = this.ctx.createBufferSource();
        noise.buffer = noiseBuffer;
        noise.loop = true;

        const filter1 = this.ctx.createBiquadFilter();
        filter1.type = 'bandpass';
        filter1.frequency.value = 320;
        filter1.Q.value = 0.8;

        const filter2 = this.ctx.createBiquadFilter();
        filter2.type = 'lowpass';
        filter2.frequency.value = 500;

        this.ventGain = this.ctx.createGain();
        this.ventGain.gain.value = 0.035;

        noise.connect(filter1);
        filter1.connect(filter2);
        filter2.connect(this.ventGain);
        this.ventGain.connect(this.ctx.destination);
        noise.start();

        // LFO para pulsar levemente — sensação de respiração
        const lfo = this.ctx.createOscillator();
        const lfoG = this.ctx.createGain();
        lfo.frequency.value = 0.08;
        lfoG.gain.value = 0.015;
        lfo.connect(lfoG);
        lfoG.connect(this.ventGain.gain);
        lfo.start();
    }

    _setupEco() {
        // Sub-drone: solidão
        const osc = this.ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(55, this.ctx.currentTime);

        const lfo2 = this.ctx.createOscillator();
        const lfo2G = this.ctx.createGain();
        lfo2.frequency.value = 0.04;
        lfo2G.gain.value = 1.5;
        lfo2.connect(lfo2G);
        lfo2G.connect(osc.frequency);
        lfo2.start();

        this.echoGain = this.ctx.createGain();
        this.echoGain.gain.value = 0.018;
        osc.connect(this.echoGain);
        this.echoGain.connect(this.ctx.destination);
        osc.start();
    }

    playInteract() {
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(520, t);
        osc.frequency.exponentialRampToValueAtTime(280, t + 0.18);
        g.gain.setValueAtTime(0.07, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(t + 0.25);
    }

    playFootstep() {
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(80, t);
        osc.frequency.exponentialRampToValueAtTime(20, t + 0.08);
        g.gain.setValueAtTime(0.06, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(t + 0.12);
    }

    playNav() {
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200 + Math.random() * 30, t);
        g.gain.setValueAtTime(0.04, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(t + 0.1);
    }

    updateProximity(moduleType, dist) {
        if (!this.initialized) return;
        // Quanto mais perto de um módulo, mais o vent "respira"
        const vol = 0.035 + dist * 0.04;
        this.ventGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.3);
    }
}

const sfx = new HabitatAudio();

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mCard = document.getElementById('module-card');
const mTitle = document.getElementById('m-title');
const mDesc = document.getElementById('m-desc');
const actBtn = document.getElementById('action-btn');

let w, h, cx, cy, ringRadius, ringWidth;
let playerAngle = 0;
let stationRot = 0;
let playerVel = 0;
let input = 0;
let time = 0;
let stars = [];
let lastStep = 0;
let currentActiveModule = null;

// ─── MÓDULOS DO HABITAT ───────────────────────────────────────────────────────
// Cada módulo tem tipo visual e atmosfera narrativa
const modules = [
    {
        angle: 0,
        name: "BELICHES — B1/B2",
        desc: "Camas vazias. Cobertores dobrados com precisão militar. Ninguém dormiu aqui desde o evento.",
        color: "#4ade80",
        type: "bunks",
        link: null
    },
    {
        angle: Math.PI / 3,
        name: "BELICHE — B3 (JOHN)",
        desc: "Sua cama. Um diário debaixo do travesseiro. A foto da família ainda colada na parede.",
        color: "#fbbf24",
        type: "john_bunk",
        link: null
    },
    {
        angle: (Math.PI / 3) * 2,
        name: "ÁREA DE CONVÍVIO",
        desc: "Mesa de refeições para 12. Hoje só há uma bandeja. O café ainda está quente.",
        color: "#7dd3fc",
        type: "lounge",
        link: null
    },
    {
        angle: Math.PI,
        name: "TERMINAL PESSOAL",
        desc: "Mensagens não lidas: 0. Última conexão com Terra: 72h atrás. Sinal: PERDIDO.",
        color: "#f87171",
        type: "terminal",
        link: null
    },
    {
        angle: (Math.PI / 3) * 4,
        name: "ARMÁRIOS DE PESSOAL",
        desc: "11 armários trancados. Pertences da tripulação intactos. Todos partiram sem avisar.",
        color: "#a78bfa",
        type: "lockers",
        link: null
    },
    {
        angle: (Math.PI / 3) * 5,
        name: "SAÍDA — CORREDOR A1",
        desc: "Porta pressurizada de retorno à estação principal.",
        color: "#4ade80",
        type: "exit",
        link: "index.html" // <--- EDITE AQUI: Substitua "index.html" pelo nome do seu arquivo .html para mudar o destino da porta
    }
];

// ─── PARTÍCULAS DE POEIRA ─────────────────────────────────────────────────────
const dustParticles = Array.from({ length: 40 }, () => ({
    angle: Math.random() * Math.PI * 2,
    r: (Math.random() * 0.3 + 0.05),   // fração do anel
    speed: (Math.random() - 0.5) * 0.0003,
    size: Math.random() * 1.2 + 0.3,
    opacity: Math.random() * 0.3 + 0.05
}));

// ─── ESTRELAS ─────────────────────────────────────────────────────────────────
function initStars() {
    stars = [];
    for (let i = 0; i < 250; i++) {
        stars.push({
            x: (Math.random() - 0.5) * 2200,
            y: (Math.random() - 0.5) * 2200,
            s: Math.random() * 1.4 + 0.2,
            o: Math.random() * 0.7 + 0.1
        });
    }
}

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    cx = w / 2; cy = h / 2;
    ringRadius = Math.min(w, h) * 0.27;
    ringWidth = ringRadius * 0.60;
    if (stars.length === 0) initStars();
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
const setInput = (id, val) => {
    const el = document.getElementById(id);
    const start = (e) => {
        e.preventDefault();
        sfx.init(); input = val; sfx.playNav();
    };
    const end = () => { if (input === val) input = 0; };
    el.addEventListener('mousedown', start);
    el.addEventListener('touchstart', start, { passive: false });
    window.addEventListener('mouseup', end);
    window.addEventListener('touchend', end);
};
setInput('btn-left', 0.0012);
setInput('btn-right', -0.0012);

window.addEventListener('keydown', (e) => {
    sfx.init();
    const k = e.key.toLowerCase();
    if (k === 'a' || k === 'arrowleft') input = 0.0012;
    if (k === 'd' || k === 'arrowright') input = -0.0012;
    if (e.key === 'Enter') triggerAction();
});
window.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if ((k === 'a' || k === 'arrowleft') && input > 0) input = 0;
    if ((k === 'd' || k === 'arrowright') && input < 0) input = 0;
});
window.addEventListener('click', () => sfx.init());

// ─── AÇÃO ─────────────────────────────────────────────────────────────────────
function triggerAction() {
    if (!currentActiveModule) return;
    sfx.init(); sfx.playInteract();
    if (currentActiveModule.link) {
        actBtn.style.transform = 'scale(0.92)';
        // COMENTÁRIO: O redirecionamento para a próxima página ocorre aqui.
        // Se você quiser executar um código personalizado ao sair, pode colá-lo abaixo.
        setTimeout(() => { 
            window.location.href = currentActiveModule.link; 
        }, 120);
    }
}
actBtn.addEventListener('click', triggerAction);

// ─── DESENHO: ASTRONAUTA ─────────────────────────────────────────────────────
function drawAstronaut(t, vel) {
    ctx.save();
    const moving = Math.abs(vel) > 0.0004;
    const animSpeed = 11;
    const walkPhase = moving ? Math.sin(t * animSpeed) : 0;
    if (vel < -0.0001) ctx.scale(1, 1);
    else if (vel > 0.0001) ctx.scale(-1, 1);

    const s = ringRadius / 200;
    ctx.scale(s, s);
    // Desloca para baixo (+12) para que os pés fiquem dentro da linha do chão
    ctx.translate(0, 12);

    const white = '#ffffff';
    const bodyGrey = '#cbd5e1';
    const helmetDark = '#0f172a';
    const green = '#4ade80';

    // Pernas
    ctx.save(); ctx.translate(-5.5, -2); ctx.rotate(moving ? walkPhase * 0.6 : 0);
    ctx.fillStyle = bodyGrey; ctx.beginPath();
    ctx.roundRect(-4.4, 0, 8.8, 17.6, [1, 1, 4, 4]); ctx.fill(); ctx.restore();

    ctx.save(); ctx.translate(5.5, -2); ctx.rotate(moving ? -walkPhase * 0.6 : 0);
    ctx.fillStyle = white; ctx.beginPath();
    ctx.roundRect(-4.4, 0, 8.8, 17.6, [1, 1, 4, 4]); ctx.fill(); ctx.restore();

    // Corpo + braços
    ctx.save();
    const bounce = moving ? Math.abs(Math.sin(t * animSpeed)) * 1.3 : 0;
    ctx.translate(0, -bounce - 2);

    ctx.fillStyle = '#334155'; ctx.beginPath();
    ctx.roundRect(-14, -28, 10, 24, 4); ctx.fill();
    ctx.fillStyle = white; ctx.beginPath();
    ctx.roundRect(-12, -32, 24, 32, [8, 8, 4, 4]); ctx.fill();

    ctx.fillStyle = green;
    ctx.globalAlpha = 0.5 + Math.sin(t * 4) * 0.5;
    ctx.fillRect(-5, -22, 10, 2);
    ctx.globalAlpha = 1;

    ctx.save(); ctx.translate(-10, -25); ctx.rotate(moving ? -walkPhase * 0.8 : 0.2);
    ctx.fillStyle = bodyGrey; ctx.beginPath();
    ctx.roundRect(-3.3, 0, 6.6, 19.8, 4); ctx.fill(); ctx.restore();

    ctx.save(); ctx.translate(10, -25); ctx.rotate(moving ? walkPhase * 0.8 : -0.2);
    ctx.fillStyle = white; ctx.beginPath();
    ctx.roundRect(-3.3, 0, 6.6, 19.8, 4); ctx.fill(); ctx.restore();

    // Capacete
    ctx.save(); ctx.translate(0, -38);
    ctx.fillStyle = white; ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = helmetDark; ctx.beginPath();
    ctx.ellipse(4, -1, 11, 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    ctx.restore(); ctx.restore();
}

// ─── DESENHO: MÓDULOS ─────────────────────────────────────────────────────────
function drawModule(m, isActive) {
    ctx.save();
    ctx.rotate(m.angle);

    const outer = ringRadius + ringWidth / 2;
    const inner = ringRadius - ringWidth / 2;
    const mid   = ringRadius;
    const pulse  = 0.5 + Math.sin(time * (m.type === 'terminal' ? 8 : 2.5)) * 0.5;
    const glow   = isActive ? 1 : 0.55;

    // ── LUZES NO TETO (inner) — presentes em todos os módulos ────────────────
    const lightSpacing = 18;
    const numLights = 3;
    for (let i = 0; i < numLights; i++) {
        const ly = -lightSpacing + i * lightSpacing;
        // Suporte da lâmpada
        ctx.fillStyle = '#334155';
        ctx.fillRect(inner + 1, ly - 1, 5, 3);
        // Corpo da lâmpada
        ctx.fillStyle = '#1e293b';
        ctx.beginPath(); ctx.roundRect(inner + 1, ly + 2, 5, 7, 2); ctx.fill();
        // Luz acesa
        const litColor = m.color;
        ctx.fillStyle = litColor;
        ctx.globalAlpha = (0.4 + pulse * 0.5) * glow;
        ctx.beginPath(); ctx.roundRect(inner + 2, ly + 3, 3, 5, 1); ctx.fill();
        // Halo difuso
        ctx.globalAlpha = 0.06 * glow;
        ctx.fillStyle = litColor;
        ctx.beginPath(); ctx.arc(inner + 3.5, ly + 5, 12, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }

    // ── BELICHE MODERNO ───────────────────────────────────────────────────────
    if (m.type === 'bunks') {
        const W = 46; const H = 82; const x = outer - W;
        // Estrutura principal
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(x, -H/2, W, H);
        ctx.strokeStyle = isActive ? m.color : '#334155';
        ctx.lineWidth = isActive ? 1.5 : 1;
        ctx.strokeRect(x, -H/2, W, H);

        // Pés metálicos (4 cantos)
        ctx.fillStyle = '#475569';
        ctx.fillRect(x,      H/2 - 6, 5, 6);
        ctx.fillRect(x+W-5,  H/2 - 6, 5, 6);

        // Escada lateral
        ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x+W-4, -H/2+6); ctx.lineTo(x+W-4, H/2-6); ctx.stroke();
        for (let r = 0; r < 4; r++) {
            const ry = -H/2 + 14 + r * 16;
            ctx.beginPath(); ctx.moveTo(x+W-4, ry); ctx.lineTo(x+W+2, ry); ctx.stroke();
        }

        // Divisória entre camas
        ctx.fillStyle = '#334155';
        ctx.fillRect(x+2, 0, W-6, 3);

        // Cama de cima — vazia, colchão dobrado
        ctx.fillStyle = '#0f172a'; ctx.fillRect(x+3, -H/2+5, W-10, H/2-10);
        ctx.fillStyle = '#1e3a5f'; ctx.fillRect(x+4, -H/2+6, W-12, 8); // colchão
        ctx.fillStyle = '#2d4a6b'; ctx.fillRect(x+4, -H/2+6, W-12, 3); // cobertor dobrado
        ctx.fillStyle = '#64748b'; ctx.fillRect(x+4, -H/2+14, 10, 7);  // travesseiro

        // Cama de baixo — John, mais bagunçada
        ctx.fillStyle = '#0f1f0f'; ctx.fillRect(x+3, 5, W-10, H/2-12);
        ctx.fillStyle = '#1a3a1a'; ctx.fillRect(x+4, 6, W-12, 10);  // cobertor
        ctx.fillStyle = '#2d5a2d'; ctx.fillRect(x+4, 6, 12, 10);    // cobertor puxado
        ctx.fillStyle = '#4a7a4a'; ctx.fillRect(x+4, 6, 8, 4);

        // Utensílios sobre a cama de baixo: copo + tablete
        ctx.fillStyle = '#475569'; ctx.fillRect(x+30, 4, 5, 7);       // copo
        ctx.fillStyle = '#7dd3fc'; ctx.fillRect(x+30, 4, 5, 1);       // borda copo
        ctx.fillStyle = '#1e293b'; ctx.fillRect(x+22, 3, 7, 5);       // tablete
        ctx.fillStyle = '#0ea5e9'; ctx.globalAlpha = 0.4 + pulse * 0.3;
        ctx.fillRect(x+23, 4, 5, 3);                                   // tela do tablete
        ctx.globalAlpha = 1;

        // Foto na cabeceira
        ctx.fillStyle = '#78350f'; ctx.fillRect(x+3, -H/2+22, 8, 11);
        ctx.fillStyle = '#fbbf24'; ctx.globalAlpha = 0.7;
        ctx.fillRect(x+4, -H/2+23, 6, 9);
        ctx.globalAlpha = 1;

        if (isActive) {
            ctx.save(); ctx.shadowBlur = 18; ctx.shadowColor = m.color;
            ctx.strokeStyle = m.color; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.5;
            ctx.strokeRect(x, -H/2, W, H); ctx.restore();
        }
    }

    // ── TERMINAL / COMPUTADOR ─────────────────────────────────────────────────
    else if (m.type === 'terminal') {
        const W = 50; const H = 70; const x = outer - W;

        // Base/suporte na parede
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(x, -H/2, W, H);
        ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.5;
        ctx.strokeRect(x, -H/2, W, H);

        // Monitor — moldura
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(x+4, -H/2+4, W-8, H/2-2);
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
        ctx.strokeRect(x+4, -H/2+4, W-8, H/2-2);

        // Tela — sem sinal (vermelho escuro + estática)
        ctx.fillStyle = '#1c0505';
        ctx.fillRect(x+6, -H/2+6, W-12, H/2-6);
        for (let i = 0; i < 7; i++) {
            const lY = -H/2 + 10 + i * 4 + Math.sin(time * 15 + i) * 1.2;
            ctx.strokeStyle = `rgba(239,68,68,${0.07 + Math.random() * 0.12})`;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(x+6, lY); ctx.lineTo(x+W-6, lY); ctx.stroke();
        }
        // Texto "NO SIGNAL"
        ctx.fillStyle = '#ef4444'; ctx.globalAlpha = 0.25 + pulse * 0.25;
        ctx.font = '4px Orbitron, monospace';
        ctx.fillText('NO SIGNAL', x+10, -H/2 + H/4 + 2);
        ctx.globalAlpha = 1;

        // Pescoço do monitor
        ctx.fillStyle = '#334155';
        ctx.fillRect(x + W/2 - 3, 0, 6, 6);
        ctx.fillRect(x + W/2 - 10, 5, 20, 4);

        // Teclado físico
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(x+4, H/2-22, W-8, 14);
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
        ctx.strokeRect(x+4, H/2-22, W-8, 14);
        // Teclas
        for (let row = 0; row < 2; row++) {
            for (let col = 0; col < 8; col++) {
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(x+6 + col*5, H/2-20 + row*6, 4, 4);
            }
        }
        // LED de erro piscando
        ctx.fillStyle = '#ef4444'; ctx.globalAlpha = pulse;
        ctx.beginPath(); ctx.arc(x+W-6, H/2-6, 3, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;

        // Mouse
        ctx.fillStyle = '#1e293b';
        ctx.beginPath(); ctx.ellipse(x+W+4, H/2-14, 5, 7, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 0.8; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+W+4, H/2-14); ctx.lineTo(x+W+4, H/2-8); ctx.stroke();
    }

    // ── ARMÁRIO ALTO ──────────────────────────────────────────────────────────
    else if (m.type === 'lockers') {
        const W = 52; const H = 86; const x = outer - W;

        // Estrutura geral
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(x, -H/2, W, H);
        ctx.strokeStyle = isActive ? m.color : '#334155';
        ctx.lineWidth = isActive ? 1.5 : 1;
        ctx.strokeRect(x, -H/2, W, H);

        // 3 vãos (prateleiras abertas) × 2 colunas
        const colW = (W - 6) / 2;
        const vaoH = (H - 10) / 3;

        for (let col = 0; col < 2; col++) {
            for (let row = 0; row < 3; row++) {
                const vx = x + 3 + col * (colW + 2);
                const vy = -H/2 + 4 + row * (vaoH + 1);
                // Fundo do vão
                ctx.fillStyle = '#0a0f0a';
                ctx.fillRect(vx, vy, colW, vaoH - 1);
                ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 0.8;
                ctx.strokeRect(vx, vy, colW, vaoH - 1);

                // Conteúdo variado por vão
                const seed = col * 3 + row;
                if (seed === 0) {
                    // Capacete guardado
                    ctx.fillStyle = '#e2e8f0';
                    ctx.beginPath(); ctx.arc(vx + colW/2, vy + vaoH/2, 6, Math.PI, 0); ctx.fill();
                    ctx.fillStyle = '#0f172a';
                    ctx.beginPath(); ctx.ellipse(vx + colW/2 + 1.5, vy + vaoH/2, 4.5, 3, 0, 0, Math.PI*2); ctx.fill();
                } else if (seed === 1) {
                    // Foto na parede do vão
                    ctx.fillStyle = '#78350f'; ctx.fillRect(vx+3, vy+3, 8, 10);
                    ctx.fillStyle = '#fbbf24'; ctx.globalAlpha = 0.6;
                    ctx.fillRect(vx+4, vy+4, 6, 8); ctx.globalAlpha = 1;
                    // Roupas dobradas
                    ctx.fillStyle = '#334155'; ctx.fillRect(vx+2, vy+vaoH-6, colW-4, 4);
                } else if (seed === 2) {
                    // Garrafa + copo
                    ctx.fillStyle = '#1d4ed8'; ctx.fillRect(vx+4, vy+4, 5, vaoH-8);
                    ctx.fillStyle = '#60a5fa'; ctx.fillRect(vx+4, vy+4, 5, 3);
                    ctx.fillStyle = '#475569'; ctx.fillRect(vx+12, vy+vaoH-10, 4, 8);
                } else if (seed === 3) {
                    // Roupas penduradas
                    ctx.strokeStyle = '#64748b'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(vx+4, vy+3); ctx.lineTo(vx+colW-4, vy+3); ctx.stroke();
                    for (let c = 0; c < 3; c++) {
                        ctx.fillStyle = ['#1e3a5f','#1a3a1a','#3b1a1a'][c];
                        ctx.fillRect(vx + 3 + c*7, vy+4, 5, vaoH-6);
                    }
                } else if (seed === 4) {
                    // Livros empilhados
                    const cols2 = ['#1d4ed8','#065f46','#7c2d12','#4c1d95'];
                    for (let b = 0; b < 4; b++) {
                        ctx.fillStyle = cols2[b];
                        ctx.fillRect(vx+2 + b*5, vy+vaoH-12, 4, 10);
                    }
                } else {
                    // Vão vazio do colega desaparecido
                    ctx.fillStyle = '#ef4444'; ctx.globalAlpha = 0.04 + pulse*0.03;
                    ctx.fillRect(vx, vy, colW, vaoH-1); ctx.globalAlpha = 1;
                }
            }
        }

        // Pés
        ctx.fillStyle = '#334155';
        ctx.fillRect(x+2, H/2-4, 8, 4);
        ctx.fillRect(x+W-10, H/2-4, 8, 4);

        if (isActive) {
            ctx.save(); ctx.shadowBlur = 16; ctx.shadowColor = m.color;
            ctx.strokeStyle = m.color; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.4;
            ctx.strokeRect(x, -H/2, W, H); ctx.restore();
        }
    }

    // ── ÁREA DE CONVÍVIO ──────────────────────────────────────────────────────
    else if (m.type === 'lounge') {
        const W = 50; const H = 72; const x = outer - W;

        ctx.fillStyle = '#0f1a1f'; ctx.fillRect(x, -H/2, W, H);
        ctx.strokeStyle = isActive ? m.color : '#334155'; ctx.lineWidth = 1;
        ctx.strokeRect(x, -H/2, W, H);

        // Mesa central
        const mx = x+8; const mw = W-16; const mh = 14;
        const mTop = -7;
        ctx.fillStyle = '#1e3a3a'; ctx.fillRect(mx, mTop, mw, mh);
        ctx.strokeStyle = '#2d5a5a'; ctx.lineWidth = 1; ctx.strokeRect(mx, mTop, mw, mh);
        // Pés da mesa
        ctx.fillStyle = '#334155';
        ctx.fillRect(mx+2, mTop+mh, 3, 8);
        ctx.fillRect(mx+mw-5, mTop+mh, 3, 8);

        // Cadeiras — 2 de cada lado (só 1 virada para o lado do john)
        for (let i = 0; i < 2; i++) {
            const cy2 = -20 + i * 28;
            ctx.fillStyle = i === 0 ? '#1a2e1a' : '#1e293b';
            ctx.fillRect(x+4, cy2, 6, 10);
            ctx.fillRect(x+W-10, cy2, 6, 10);
            // Encosto
            ctx.fillStyle = i === 0 ? '#2d4a2d' : '#334155';
            ctx.fillRect(x+3, cy2-4, 8, 5);
            ctx.fillRect(x+W-11, cy2-4, 8, 5);
        }

        // Bandeja + café (só 1 pessoa)
        ctx.fillStyle = '#374151'; ctx.fillRect(mx+3, mTop+2, 14, 9);
        ctx.fillStyle = '#78350f'; ctx.fillRect(mx+14, mTop+3, 4, 7); // copo café
        ctx.fillStyle = '#fbbf24'; ctx.globalAlpha = 0.2; ctx.fillRect(mx+14, mTop+3, 4, 2); ctx.globalAlpha=1;
        // Vapor
        ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth=1;
        ctx.globalAlpha = 0.3 + Math.sin(time*3)*0.3;
        ctx.beginPath(); ctx.moveTo(mx+16, mTop+2); ctx.quadraticCurveTo(mx+18, mTop-3, mx+15, mTop-6); ctx.stroke();
        ctx.globalAlpha = 1;
        // Tablete na mesa
        ctx.fillStyle = '#1e293b'; ctx.fillRect(mx+20, mTop+2, 10, 7);
        ctx.fillStyle = '#0ea5e9'; ctx.globalAlpha = 0.2 + pulse*0.2;
        ctx.fillRect(mx+21, mTop+3, 8, 5); ctx.globalAlpha=1;
    }

    // ── SAÍDA ─────────────────────────────────────────────────────────────────
    else if (m.type === 'exit') {
        const portalW = ringWidth * 0.45;
        ctx.fillStyle = '#010205';
        ctx.fillRect(inner + 2, -portalW/2, ringWidth - 4, portalW);

        if (isActive) {
            ctx.save(); ctx.shadowBlur = 25; ctx.shadowColor = m.color;
            ctx.strokeStyle = m.color; ctx.lineWidth = 3;
            ctx.globalAlpha = 0.5 + pulse * 0.5;
            ctx.strokeRect(inner, -portalW/2 - 2, ringWidth, portalW + 4);
            ctx.restore();
        }

        const slide = isActive ? (portalW/2) * 0.7 : 0;
        ctx.save();
        ctx.beginPath(); ctx.rect(inner+2, -portalW/2, ringWidth-4, portalW); ctx.clip();
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(inner+2, -portalW/2 - slide, ringWidth, portalW/2);
        ctx.fillRect(inner+2, slide, ringWidth, portalW/2);
        ctx.fillStyle = m.color; ctx.globalAlpha = 0.25;
        ctx.fillRect(inner+2, -2, ringWidth-4, 4);
        ctx.restore();
    }

    // O personagem caminha em outer (chão externo). Módulos ficam em outer e crescem
    // para DENTRO do anel — ou seja, em direção ao centro, valores X decrescentes (outer - W).

    if (m.type === 'bunks') {
        const W = 28; const H = 76;
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(outer - W, -H / 2, W, H);
        ctx.strokeStyle = '#475569'; ctx.lineWidth = 1.5;
        ctx.strokeRect(outer - W, -H / 2, W, H);

        for (let i = 0; i < 3; i++) {
            const bY = -30 + i * 24;
            ctx.fillStyle = '#0f172a'; ctx.fillRect(outer - W + 3, bY, 18, 18);
            ctx.fillStyle = '#334155'; ctx.fillRect(outer - W + 4, bY + 2, 16, 6);
            ctx.fillStyle = '#64748b'; ctx.fillRect(outer - W + 4, bY + 10, 7, 5);
        }

        // Luz de presença apagada
        ctx.fillStyle = '#1e293b'; ctx.fillRect(outer - 6, -H / 2 + 3, 4, 4);
        if (isActive) {
            ctx.fillStyle = m.color;
            ctx.globalAlpha = 0.3 + pulse * 0.3;
            ctx.fillRect(outer - 6, -H / 2 + 3, 4, 4);
            ctx.globalAlpha = 1;
        }
    }

    else if (m.type === 'john_bunk') {
        const W = 30; const H = 76;
        ctx.fillStyle = '#1e2d1e';
        ctx.fillRect(outer - W, -H / 2, W, H);
        ctx.strokeStyle = m.color; ctx.lineWidth = 1.5;
        ctx.strokeRect(outer - W, -H / 2, W, H);

        // Cama do John
        ctx.fillStyle = '#0f1f0f'; ctx.fillRect(outer - W + 3, -12, 20, 20);
        ctx.fillStyle = '#1a3a1a'; ctx.fillRect(outer - W + 4, -10, 18, 8);

        // Foto colada na parede do chão
        ctx.fillStyle = '#78350f'; ctx.fillRect(outer - 10, -28, 8, 10);
        ctx.fillStyle = '#fbbf24';
        ctx.globalAlpha = 0.6 + Math.sin(time * 0.5) * 0.1;
        ctx.fillRect(outer - 9, -27, 6, 8);
        ctx.globalAlpha = 1;

        // Diário sob travesseiro
        ctx.fillStyle = '#7c2d12'; ctx.fillRect(outer - W + 4, -10, 7, 2);

        if (isActive) {
            ctx.save();
            ctx.shadowBlur = 20; ctx.shadowColor = m.color;
            ctx.strokeStyle = m.color; ctx.lineWidth = 2; ctx.globalAlpha = 0.6;
            ctx.strokeRect(outer - W, -H / 2, W, H);
            ctx.restore();
        }
    }

    else if (m.type === 'lounge') {
        const W = 38; const H = 60;
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(outer - W, -H / 2, W, H);
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5;
        ctx.strokeRect(outer - W, -H / 2, W, H);

        // Mesa
        ctx.fillStyle = '#0f172a'; ctx.fillRect(outer - W + 4, -H / 2 + 6, W - 8, H - 12);

        // Cadeiras
        for (let i = 0; i < 4; i++) {
            const sY = -H / 2 + 8 + i * 12;
            ctx.fillStyle = (i === 1 && isActive) ? '#1a2e1a' : '#1e293b';
            ctx.fillRect(outer - W + 6, sY, 6, 8);
            ctx.fillRect(outer - 10, sY, 6, 8);
        }

        // Bandeja solitária
        ctx.fillStyle = '#374151'; ctx.fillRect(outer - W + 12, -5, 14, 10);
        ctx.fillStyle = '#78350f'; ctx.fillRect(outer - W + 22, -3, 4, 6);

        // Vapor do café
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1; ctx.globalAlpha = 0.3 + Math.sin(time * 3) * 0.3;
        ctx.beginPath(); ctx.moveTo(outer - W + 24, -4); ctx.lineTo(outer - W + 23, -10); ctx.stroke();
        ctx.globalAlpha = 1;

        // Luz de teto
        ctx.fillStyle = m.color;
        ctx.globalAlpha = isActive ? (0.5 + pulse * 0.4) : 0.15;
        ctx.fillRect(outer - W / 2 - 4, -H / 2 + 2, 8, 3);
        ctx.globalAlpha = 1;
    }

    else if (m.type === 'terminal') {
        const W = 24; const H = 48;
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(outer - W, -H / 2, W, H);
        ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
        ctx.strokeRect(outer - W, -H / 2, W, H);

        // Tela sem sinal
        ctx.fillStyle = '#1c0a0a'; ctx.fillRect(outer - W + 3, -H / 2 + 4, W - 6, H - 14);

        // Estática
        for (let i = 0; i < 5; i++) {
            const lY = -H / 2 + 8 + i * 6 + Math.sin(time * 12 + i) * 1.5;
            ctx.strokeStyle = `rgba(239,68,68,${0.1 + Math.random() * 0.15})`;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(outer - W + 3, lY); ctx.lineTo(outer - 3, lY); ctx.stroke();
        }

        // Indicador sem sinal
        ctx.fillStyle = '#ef4444';
        ctx.globalAlpha = 0.4 + pulse * 0.6;
        ctx.fillRect(outer - W / 2 - 3, 2, 6, 2);
        ctx.globalAlpha = 1;

        // LED erro piscando
        ctx.fillStyle = '#ef4444'; ctx.globalAlpha = pulse;
        ctx.beginPath(); ctx.arc(outer - 4, H / 2 - 8, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }

    else if (m.type === 'lockers') {
        const W = 28; const H = 76;
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(outer - W, -H / 2, W, H);
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5;
        ctx.strokeRect(outer - W, -H / 2, W, H);

        for (let col = 0; col < 2; col++) {
            for (let row = 0; row < 6; row++) {
                const lx = outer - W + 2 + col * 13;
                const ly = -H / 2 + 3 + row * 12;
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(lx, ly, 10, 10);
                ctx.strokeStyle = '#334155'; ctx.lineWidth = 0.8;
                ctx.strokeRect(lx, ly, 10, 10);
                ctx.fillStyle = '#475569';
                ctx.fillRect(lx + 4, ly + 4, 2, 3);
            }
        }

        ctx.fillStyle = m.color;
        ctx.globalAlpha = isActive ? 0.15 : 0.04;
        ctx.fillRect(outer - W + 2, -H / 2 + 3, 10, 10);
        ctx.globalAlpha = 1;
    }

    else if (m.type === 'exit') {
        const portalW = ringWidth * 0.45;
        ctx.fillStyle = '#010205';
        ctx.fillRect(inner + 2, -portalW / 2, ringWidth - 4, portalW);

        if (isActive) {
            ctx.save();
            ctx.shadowBlur = 25; ctx.shadowColor = m.color;
            ctx.strokeStyle = m.color; ctx.lineWidth = 3;
            ctx.globalAlpha = 0.5 + pulse * 0.5;
            ctx.strokeRect(inner, -portalW / 2 - 2, ringWidth, portalW + 4);
            ctx.restore();
        }

        const slide = isActive ? (portalW / 2) * 0.7 : 0;
        ctx.save();
        ctx.beginPath(); ctx.rect(inner + 2, -portalW / 2, ringWidth - 4, portalW); ctx.clip();
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(inner + 2, -portalW / 2 - slide, ringWidth, portalW / 2);
        ctx.fillRect(inner + 2, slide, ringWidth, portalW / 2);
        ctx.fillStyle = m.color; ctx.globalAlpha = 0.25;
        ctx.fillRect(inner + 2, -2, ringWidth - 4, 4);
        ctx.restore();
    }

    ctx.restore();

    // Detecção de proximidade
    const pAng = ((playerAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    const mAng = ((m.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    let diff = Math.abs(pAng - mAng);
    if (diff > Math.PI) diff = Math.PI * 2 - diff;
    return diff < 0.22;
}

// ─── LOOP PRINCIPAL ───────────────────────────────────────────────────────────
function loop() {
    resize();
    time += 0.016;
    stationRot += 0.0007; // anel gira mais devagar — peso da solidão
    playerVel += input;
    playerVel *= 0.84;
    playerAngle += playerVel;

    // Som de passo
    if (Math.abs(playerVel) > 0.0008) {
        const stepPeriod = 0.55;
        if (time - lastStep > stepPeriod) {
            sfx.playFootstep();
            lastStep = time;
        }
    }

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#010205';
    ctx.fillRect(0, 0, w, h);

    // Fundo estelar
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(stationRot * 0.4);
    stars.forEach(s => {
        const flicker = 0.6 + Math.sin(time * 1.5 + s.x) * 0.4;
        ctx.globalAlpha = s.o * flicker;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill();
    });
    ctx.restore();

    // Anel principal
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(stationRot);

    const rIn = ringRadius - ringWidth / 2;
    const rOut = ringRadius + ringWidth / 2;

    // Gradiente radial do anel — verde escurecido, habitat
    const ringG = ctx.createRadialGradient(0, 0, rIn, 0, 0, rOut);
    ringG.addColorStop(0, '#06100a');
    ringG.addColorStop(0.3, '#0d1f12');
    ringG.addColorStop(0.7, '#0d1f12');
    ringG.addColorStop(1, '#06100a');
    ctx.beginPath();
    ctx.arc(0, 0, rOut, 0, Math.PI * 2, false);
    ctx.arc(0, 0, rIn, 0, Math.PI * 2, true);
    ctx.fillStyle = ringG; ctx.fill();

    // Grade interna sutil
    ctx.strokeStyle = 'rgba(74, 222, 128, 0.04)'; ctx.lineWidth = 1;
    for (let i = 0; i < 24; i++) {
        ctx.save(); ctx.rotate(i * (Math.PI / 12));
        ctx.beginPath(); ctx.moveTo(rIn, 0); ctx.lineTo(rOut, 0); ctx.stroke();
        ctx.restore();
    }

    // Partículas de poeira flutuando no anel
    dustParticles.forEach(d => {
        d.angle += d.speed + stationRot * 0;
        const dr = rIn + d.r * ringWidth;
        const dx = Math.cos(d.angle) * dr;
        const dy = Math.sin(d.angle) * dr;
        ctx.globalAlpha = d.opacity * (0.5 + Math.sin(time * 2 + d.angle) * 0.5);
        ctx.fillStyle = '#4ade80';
        ctx.beginPath(); ctx.arc(dx, dy, d.size, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Teto interno
    ctx.beginPath(); ctx.arc(0, 0, rIn, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(74, 222, 128, 0.25)'; ctx.lineWidth = 3; ctx.stroke();
    // Luz neon de teto
    ctx.beginPath(); ctx.arc(0, 0, rIn + 3, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(74, 222, 128, 0.08)'; ctx.lineWidth = 1; ctx.stroke();

    // Módulos
    let activeMod = null;
    modules.forEach(m => {
        if (drawModule(m, false)) {
            if (!activeMod) activeMod = m;
        }
    });
    // Segundo passo: desenha o ativo por cima com destaque
    if (activeMod) {
        drawModule(activeMod, true);
        sfx.updateProximity(activeMod.type, 1);
    } else {
        sfx.updateProximity(null, 0);
    }
    currentActiveModule = activeMod;

    // Astronauta
    ctx.save();
    ctx.rotate(playerAngle);
    ctx.translate(ringRadius + ringWidth / 2 - 22, 0);
    ctx.rotate(-Math.PI / 2);
    drawAstronaut(time, playerVel);
    ctx.restore();

    // Linha do CHÃO — por cima de tudo
    ctx.beginPath(); ctx.arc(0, 0, rOut, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(74, 222, 128, 0.85)'; ctx.lineWidth = 4; ctx.stroke();

    ctx.restore(); // fim da translação do anel

    // UI — módulo ativo
    if (currentActiveModule) {
        mTitle.innerText = currentActiveModule.name;
        mTitle.style.color = currentActiveModule.color;
        mTitle.style.textShadow = `0 0 14px ${currentActiveModule.color}`;
        mDesc.innerText = currentActiveModule.desc;
        mCard.classList.add('visible');
        actBtn.classList.add('active');
        actBtn.style.background = currentActiveModule.color;
        actBtn.style.boxShadow = `0 0 30px ${currentActiveModule.color}55`;

        if (currentActiveModule.type === 'exit') {
            actBtn.innerHTML = '<b>SAIR DO<br>HABITAT</b>';
        } else if (currentActiveModule.type === 'terminal') {
            actBtn.innerHTML = '<b>VER<br>TERMINAL</b>';
        } else if (currentActiveModule.type === 'john_bunk') {
            actBtn.innerHTML = '<b>EXAMINAR<br>BELICHE</b>';
        } else {
            actBtn.innerHTML = '<b>EXAMINAR<br>MÓDULO</b>';
        }
    } else {
        mCard.classList.remove('visible');
        actBtn.classList.remove('active');
    }

    requestAnimationFrame(loop);
}

window.onload = loop;
</script>
