<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIMEWAYS - Estação Orbital</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #010205; 
            --panel: rgba(15, 23, 42, 0.9);
            --floor-grey: #64748b;
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #stage { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-top {
            position: absolute; 
            top: 50px; 
            left: 30px;
            border-left: 4px solid var(--neon);
            padding-left: 15px; 
            z-index: 100;
            text-shadow: 0 0 10px var(--neon);
        }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; font-weight: 400; }
        .value { font-weight: 900; font-size: 18px; color: var(--neon); letter-spacing: 2px; }

        #portal-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
        }
        #portal-info.visible { opacity: 1; }

        #portal-name { 
            font-size: 14px; 
            letter-spacing: 3px; 
            font-weight: 900; 
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        #portal-desc { 
            font-size: 8px; 
            opacity: 0.7; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }

        .controls-container {
            position: absolute; 
            bottom: 100px; 
            width: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 25px;
            z-index: 100;
        }
        
        .nav-btn {
            width: 60px; 
            height: 60px;
            background: var(--panel);
            border: 1px solid rgba(0,242,255,0.2);
            border-radius: 50%; 
            color: var(--neon);
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 18px; 
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .nav-btn:active { background: var(--neon); color: black; }

        #portal-trigger {
            width: 100px;
            height: 100px;
            background: var(--neon);
            color: #000; 
            border: none;
            border-radius: 50%; 
            font-weight: 900;
            font-size: 9px; 
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
            opacity: 0;
            line-height: 1.2;
            text-align: center;
        }
        #portal-trigger.active { transform: scale(1); opacity: 1; }

        .coords {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 10px;
            color: var(--neon);
            opacity: 0.4;
            letter-spacing: 1px;
            z-index: 100;
        }

        /* =====================================================================
           MODAL DO PUZZLE
           Overlay que aparece sobre o jogo quando o jogador interage com uma
           porta trancada. O puzzle corre dentro de um <iframe> isolado.
           Quando resolvido, o iframe envia postMessage e o modal fecha-se
           desbloqueando a porta no sistema de portais.
           ===================================================================== */
        #puzzle-modal {
            display: none;          /* Oculto por defeito — JS adiciona .aberto para mostrar */
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
        }
        #puzzle-modal.aberto {
            display: flex;          /* Visível quando .aberto está presente */
        }
        #puzzle-modal-inner {
            position: relative;
            width: 95vw;
            max-width: 760px;
            max-height: 92vh;
            border: 2px solid var(--neon);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.3);
            border-radius: 14px;
            overflow: hidden;
            background: #0a0a0c;
        }
        #puzzle-iframe {
            width: 100%;
            height: 88vh;
            max-height: 700px;
            border: none;
            display: block;
        }
        /* Botão X no canto — fecha o modal SEM resolver o puzzle */
        #modal-fechar {
            position: absolute;
            top: 10px;
            right: 14px;
            z-index: 10;
            background: transparent;
            border: 1px solid rgba(0,242,255,0.3);
            color: var(--neon);
            font-size: 18px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        #modal-fechar:hover { background: var(--neon); color: #000; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="stage">

    <!-- =======================================================================
         MODAL DO PUZZLE
         O iframe fica vazio (src="") até o jogador interagir com uma porta.
         O JavaScript define o src dinamicamente ao abrir o modal.
         ======================================================================= -->
    <div id="puzzle-modal">
        <div id="puzzle-modal-inner">
            <button id="modal-fechar" title="Fechar sem resolver">✕</button>
            <iframe id="puzzle-iframe" src=""></iframe>
        </div>
    </div>

    <div id="ui-top">
        <div class="label">SATURN STATION // NÍVEL A1</div>
        <div class="value">DIA 3 APÓS O EVENTO</div>
    </div>

    <div id="portal-info">
        <div id="portal-name">SECTOR</div>
        <div id="portal-desc">AGUARDANDO INPUT</div>
    </div>

    <div class="controls-container">
        <div id="btn-left" class="nav-btn">◀</div>
        <button id="portal-trigger"><b>INICIAR<br>PUZZLE</b></button>
        <div id="btn-right" class="nav-btn">▶</div>
    </div>

    <div class="coords" id="pos-display">LAT: 0.000 // LNG: 0.000</div>
    <canvas id="game"></canvas>
</div>

<script>
    let audioCtx = null;

    function ensureAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } else if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSynthSound(freq, duration, volume = 0.1, type = 'sine') {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(volume, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function playDoorSound() {
        if (!audioCtx) return;
        const noise = audioCtx.createOscillator();
        const filter = audioCtx.createBiquadFilter();
        const g = audioCtx.createGain();
        noise.type = 'sawtooth';
        noise.frequency.setValueAtTime(40, audioCtx.currentTime);
        noise.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.6);
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(400, audioCtx.currentTime);
        g.gain.setValueAtTime(0.08, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
        noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
        noise.start(); noise.stop(audioCtx.currentTime + 0.6);
    }

    const canvas   = document.getElementById('game');
    const ctx      = canvas.getContext('2d');
    const trigger  = document.getElementById('portal-trigger');
    const pInfo    = document.getElementById('portal-info');
    const pName    = document.getElementById('portal-name');
    const pDesc    = document.getElementById('portal-desc');
    const posDisplay = document.getElementById('pos-display');

    let w, h, cx, cy, radius, thickness;
    let playerAngle    = ((Math.PI * 2) / 6) * 2; // Posição inicial: alinhada ao Estaleiro
    let stationRotation = 0;
    let velocity = 0;
    let input    = 0;
    let time     = 0;
    let currentActivePortal = null;

    const keys = { left: false, right: false };

    const stars = Array.from({length: 150}, () => ({
        x: Math.random(), y: Math.random(),
        s: Math.random() * 2 + 0.5,
        o: Math.random(),
        pulse: Math.random() * 0.02
    }));

    // =========================================================================
    // PORTAIS DA ESTAÇÃO — EDITE AQUI
    // =========================================================================
    // Cada objecto representa uma porta na estação. Campos:
    //
    //   name      → Nome exibido no HUD ao aproximar
    //   color     → Cor neon da porta (hex)
    //   desc      → Texto de estado exibido no HUD
    //   isLocked  → true  = porta trancada (abre o modal de puzzle ao interagir)
    //               false = porta livre (navega directamente para url ao interagir)
    //   url       → Ficheiro HTML de destino APÓS desbloquear (para onde o botão
    //               "ENTRAR SECTOR" leva o jogador)
    //   puzzleUrl → Ficheiro HTML do puzzle carregado no modal quando isLocked=true
    //               ► COLE AQUI O NOME DO FICHEIRO DE PUZZLE DE CADA PORTA
    //   puzzleId  → Identificador único desta porta. Deve ser IGUAL ao valor que
    //               o ficheiro de puzzle envia via postMessage:
    //               window.parent.postMessage({ tipo:'puzzleResolvido', portal:'ESTE_ID' }, '*')
    //               ► MANTENHA CONSISTENTE ENTRE ESTE CAMPO E O FICHEIRO DE PUZZLE
    // =========================================================================
    const portals = [

        // ── PORTA 1: NÚCLEO TÉRMICO ───────────────────────────────────────────
        {
            angle: 0,
            name:      "NÚCLEO TÉRMICO",
            color:     "#00f2ff",
            desc:      "SISTEMA TRANCADO",
            state:     0,
            isLocked:  true,
            url:       "nucleo_termico.html",   // ◄ destino após desbloquear
            puzzleUrl: "lock_nucleo.html",       // ◄ ficheiro de puzzle (cole o nome aqui)
            puzzleId:  "nucleo"                  // ◄ deve bater com o postMessage do puzzle
        },

        // ── PORTA 2: HABITAT ──────────────────────────────────────────────────
        {
            angle: (Math.PI*2)/6,
            name:      "HABITAT",
            color:     "#4ade80",
            desc:      "ACESSO NEGADO",
            state:     0,
            isLocked:  true,
            url:       "habitat.html",           // ◄ destino após desbloquear
            puzzleUrl: "lock3.html",             // ◄ puzzle do Habitat = lock3.html
            puzzleId:  "habitat"                 // ◄ lock3.html envia { portal: 'habitat' }
        },

        // ── PORTA 3: ESTALEIRO (livre, sem puzzle) ────────────────────────────
        {
            id:        'estaleiro',              // id especial usado na lógica visual
            angle:     ((Math.PI*2)/6)*2,
            name:      "ESTALEIRO",
            color:     "#fbbf24",
            desc:      "ACESSO LIVRE",
            state:     0,
            isLocked:  false,                    // livre: não abre modal, vai directo para url
            url:       "index-estaleiro.html",   // ◄ destino directo
            puzzleUrl: null,                     // sem puzzle
            puzzleId:  null
        },

        // ── PORTA 4: CRIO-LAB ─────────────────────────────────────────────────
        {
            angle: ((Math.PI*2)/6)*3,
            name:      "CRIO-LAB",
            color:     "#a855f7",
            desc:      "BLOQUEIO ATIVO",
            state:     0,
            isLocked:  true,
            url:       "crio_lab.html",          // ◄ destino após desbloquear
            puzzleUrl: "lock_criolab.html",      // ◄ ficheiro de puzzle (cole o nome aqui)
            puzzleId:  "criolab"                 // ◄ deve bater com o postMessage do puzzle
        },

        // ── PORTA 5: BIO-DOME ─────────────────────────────────────────────────
        {
            angle: ((Math.PI*2)/6)*4,
            name:      "BIO-DOME",
            color:     "#22c55e",
            desc:      "SISTEMA EM ESPERA",
            state:     0,
            isLocked:  true,
            url:       "bio_dome.html",          // ◄ destino após desbloquear
            puzzleUrl: "lock_biodome.html",      // ◄ ficheiro de puzzle (cole o nome aqui)
            puzzleId:  "biodome"                 // ◄ deve bater com o postMessage do puzzle
        },

        // ── PORTA 6: COMANDO ──────────────────────────────────────────────────
        {
            angle: ((Math.PI*2)/6)*5,
            name:      "COMANDO",
            color:     "#ff4444",
            desc:      "ENCRIPTADO",
            state:     0,
            isLocked:  true,
            url:       "temp.html",              // ◄ destino após desbloquear
            puzzleUrl: "lock_comando.html",      // ◄ ficheiro de puzzle (cole o nome aqui)
            puzzleId:  "comando"                 // ◄ deve bater com o postMessage do puzzle
        }

    ];
    // =========================================================================
    // FIM DA CONFIGURAÇÃO DOS PORTAIS
    // =========================================================================

    function resize() {
        w = canvas.width  = window.innerWidth;
        h = canvas.height = window.innerHeight;
        cx = w / 2; cy = h / 2;
        radius    = Math.min(w, h) * 0.35;
        thickness = radius * 0.45;
    }

    // Inputs de toque/mouse
    const setupInput = (id, val) => {
        const el = document.getElementById(id);
        const start = (e) => { e.preventDefault(); input = val; ensureAudio(); playSynthSound(150 + Math.random()*20, 0.1, 0.01); };
        const end   = () => { if(input === val) input = 0; };
        el.addEventListener('mousedown',  start);
        el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mouseup',   end);
        window.addEventListener('touchend',  end);
    };
    setupInput('btn-left',  1);
    setupInput('btn-right', -1);

    // Inputs de teclado
    window.addEventListener('keydown', (e) => {
        ensureAudio();
        if (e.code === 'KeyA' || e.code === 'ArrowLeft')  keys.left  = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
        // Enter aciona o botão central (mesmo efeito de clicar)
        if ((e.code === 'Enter' || e.code === 'NumpadEnter') && trigger.classList.contains('active')) {
            trigger.click();
        }
        updateKeyboardInput();
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'KeyA' || e.code === 'ArrowLeft')  keys.left  = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
        updateKeyboardInput();
    });
    function updateKeyboardInput() {
        if      (keys.left  && !keys.right) input =  1;
        else if (keys.right && !keys.left)  input = -1;
        else                                input =  0;
    }

    // =========================================================================
    // SISTEMA DE MODAL
    // =========================================================================

    const modal       = document.getElementById('puzzle-modal');
    const modalIframe = document.getElementById('puzzle-iframe');
    const modalFechar = document.getElementById('modal-fechar');

    // Abre o modal carregando o puzzleUrl da porta no iframe
    function abrirModal(portal) {
        modalIframe.src = portal.puzzleUrl;
        modal.classList.add('aberto');
    }

    // Fecha o modal e descarrega o iframe (pára áudio/animações do puzzle)
    function fecharModal() {
        modal.classList.remove('aberto');
        modalIframe.src = '';
    }

    // Botão ✕ fecha sem resolver
    modalFechar.addEventListener('click', fecharModal);

    // Escape também fecha
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('aberto')) fecharModal();
    });

    // =========================================================================
    // RECEBER SINAL DO PUZZLE (postMessage)
    // =========================================================================
    // O ficheiro de puzzle, ao ser concluído, deve chamar:
    //   window.parent.postMessage({ tipo: 'puzzleResolvido', portal: 'ID_DA_PORTA' }, '*')
    // onde ID_DA_PORTA é o puzzleId definido acima no array portals.
    //
    // Ao receber este sinal:
    //   1. A porta fica isLocked = false (abre visualmente)
    //   2. O modal fecha-se após um breve delay
    //   3. O botão central muda para "ENTRAR SECTOR"
    //   4. O jogador pode então navegar para url da porta
    // =========================================================================
    window.addEventListener('message', (e) => {
        // Ignora mensagens que não sejam do nosso sistema de puzzle
        if (!e.data || e.data.tipo !== 'puzzleResolvido') return;

        // Encontra a porta pelo puzzleId
        const porta = portals.find(p => p.puzzleId === e.data.portal);
        if (porta) {
            porta.isLocked = false;             // desbloqueia a porta
            porta.desc     = 'ACESSO CONCEDIDO';
            // Som de desbloqueio
            playSynthSound(440, 0.2, 0.05, 'square');
            setTimeout(() => playSynthSound(660, 0.4, 0.05, 'sine'), 200);
        }

        // Fecha o modal após 600ms (dá tempo ao jogador de ver o sucesso no puzzle)
        setTimeout(fecharModal, 600);
    });

    // =========================================================================
    // BOTÃO CENTRAL — ACÇÃO AO CLICAR
    // =========================================================================
    trigger.onclick = () => {
        if (!currentActivePortal) return;
        ensureAudio();
        playSynthSound(440, 0.2, 0.05, 'square');

        if (currentActivePortal.isLocked) {
            // Porta trancada → abre o modal com o puzzle
            abrirModal(currentActivePortal);
        } else {
            // Porta desbloqueada → navega para o sector
            if (currentActivePortal.url) {
                window.location.href = currentActivePortal.url;
            }
        }
    };

    // =========================================================================
    // DESENHO DO ASTRONAUTA
    // =========================================================================
    function drawAstronaut(t, vel) {
        ctx.save();
        const moving    = Math.abs(vel) > 0.0005;
        const animSpeed = 10;
        const walkPhase = moving ? Math.sin(t * animSpeed) : 0;
        if (vel < -0.0001) ctx.scale(1, 1);
        else if (vel > 0.0001) ctx.scale(-1, 1);
        const s = (radius / 220);
        ctx.scale(s, s);

        const white     = "#ffffff";
        const bodyGrey  = "#cbd5e1";
        const helmetDark = "#0f172a";
        const highlight = "#00f2ff";

        ctx.save(); ctx.translate(-5.5, -2); ctx.rotate(moving ? walkPhase * 0.6 : 0);
        ctx.fillStyle = bodyGrey; ctx.beginPath();
        ctx.roundRect(-4.4, 0, 8.8, 17.6, [1,1,4,4]); ctx.fill(); ctx.restore();

        ctx.save(); ctx.translate(5.5, -2); ctx.rotate(moving ? -walkPhase * 0.6 : 0);
        ctx.fillStyle = white; ctx.beginPath();
        ctx.roundRect(-4.4, 0, 8.8, 17.6, [1,1,4,4]); ctx.fill(); ctx.restore();

        ctx.save();
        const bounce = moving ? Math.abs(Math.sin(t * animSpeed)) * 1.2 : 0;
        ctx.translate(0, -bounce - 2);
        ctx.fillStyle = "#334155"; ctx.roundRect(-14, -28, 10, 24, 4); ctx.fill();
        ctx.fillStyle = white;    ctx.roundRect(-12, -32, 24, 32, [8,8,4,4]); ctx.fill();
        ctx.fillStyle = highlight; ctx.globalAlpha = 0.5 + Math.sin(t*5)*0.5;
        ctx.fillRect(-5, -22, 10, 2); ctx.globalAlpha = 1;

        ctx.save(); ctx.translate(-10, -25); ctx.rotate(moving ? -walkPhase * 0.8 : 0.2);
        ctx.fillStyle = bodyGrey; ctx.roundRect(-3.3, 0, 6.6, 19.8, 4); ctx.fill(); ctx.restore();
        ctx.save(); ctx.translate(10, -25);  ctx.rotate(moving ? walkPhase * 0.8 : -0.2);
        ctx.fillStyle = white;    ctx.roundRect(-3.3, 0, 6.6, 19.8, 4); ctx.fill(); ctx.restore();

        ctx.save(); ctx.translate(0, -38);
        ctx.fillStyle = white;      ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = helmetDark; ctx.beginPath(); ctx.ellipse(4, -1, 11, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        ctx.restore(); ctx.restore();
    }

    // =========================================================================
    // DESENHO DOS PORTAIS
    // =========================================================================
    function drawPortal(p) {
        ctx.save();
        ctx.rotate(p.angle);

        const portalWidth      = thickness * 0.55;
        const normalizedPlayer = (playerAngle % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
        const normalizedPortal = (p.angle    % (Math.PI*2) + Math.PI*2) % (Math.PI*2);

        const panelOffset = 0.12;
        let distToPanel = Math.abs(normalizedPlayer - (normalizedPortal + panelOffset));
        if (distToPanel > Math.PI) distToPanel = Math.PI*2 - distToPanel;
        const isNearPanel = distToPanel < 0.1;

        let distToDoor = Math.abs(normalizedPlayer - normalizedPortal);
        if (distToDoor > Math.PI) distToDoor = Math.PI*2 - distToDoor;
        const isNearDoor = distToDoor < 0.2;

        const wasClosed = p.state === 0;
        if (!p.isLocked && isNearDoor) {
            p.state = Math.min(1, p.state + 0.05);
            if (wasClosed && p.state > 0) playDoorSound();
        } else {
            p.state = Math.max(0, p.state - 0.05);
        }

        // Fundo da abertura
        ctx.fillStyle = "#010205";
        ctx.fillRect(radius - thickness/2 + 2, -portalWidth/2, thickness - 4, portalWidth);

        // Brilho quando aberta
        if (!p.isLocked && p.state > 0) {
            ctx.save();
            ctx.shadowBlur = 25; ctx.shadowColor = p.color;
            ctx.strokeStyle = p.color; ctx.lineWidth = 4;
            ctx.globalAlpha = 0.4 + p.state * 0.6;
            ctx.strokeRect(radius - thickness/2, -portalWidth/2 - 2, thickness, portalWidth + 4);
            ctx.restore();
        }

        // Painel de controlo lateral
        ctx.save();
        ctx.translate(radius - thickness/2 + 20, portalWidth/2 + 12);
        const showOutline = p.id !== 'estaleiro' && p.isLocked && isNearPanel;
        if (showOutline) {
            ctx.shadowBlur = 15; ctx.shadowColor = p.color;
            ctx.strokeStyle = p.color; ctx.lineWidth = 2;
            ctx.strokeRect(-4, -4, 18, 28);
        }
        ctx.fillStyle = "#1e293b";
        ctx.beginPath(); ctx.roundRect(0, 0, 10, 20, 2); ctx.fill();
        const lightOn = p.id === 'estaleiro' || (p.isLocked && isNearPanel) || (!p.isLocked && isNearDoor);
        if (lightOn) {
            ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = p.color;
            ctx.fillStyle = p.color; ctx.globalAlpha = 0.7 + Math.sin(time*5)*0.3;
            ctx.fillRect(2, 4, 6, 4); ctx.restore();
        } else {
            ctx.fillStyle = "#334155"; ctx.fillRect(2, 4, 6, 4);
        }
        ctx.restore();

        // Painéis deslizantes da porta
        ctx.save();
        ctx.beginPath(); ctx.rect(radius - thickness/2 + 2, -portalWidth/2, thickness - 4, portalWidth); ctx.clip();
        const slide = p.state * (portalWidth / 2);
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(radius - thickness/2 + 2, -portalWidth/2 - slide, thickness, portalWidth/2);
        ctx.fillRect(radius - thickness/2 + 2, 0 + slide, thickness, portalWidth/2);
        ctx.fillStyle   = p.isLocked ? "#ff4444" : "#00f2ff";
        ctx.globalAlpha = 0.3 * (1 - p.state);
        if (ctx.globalAlpha > 0) ctx.fillRect(radius - thickness/2 + 2, -2, thickness - 4, 4);
        ctx.restore();

        ctx.restore();

        return p.isLocked ? isNearPanel : isNearDoor;
    }

    // =========================================================================
    // LOOP PRINCIPAL
    // =========================================================================
    function loop() {
        resize();
        time            += 0.016;
        stationRotation += 0.0025;
        playerAngle     += velocity;
        velocity        += input * 0.0012;
        velocity        *= 0.85;

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#010205";
        ctx.fillRect(0, 0, w, h);

        // Fundo estrelado
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(stationRotation * 0.15);
        stars.forEach(s => {
            s.o += s.pulse;
            if (s.o > 1 || s.o < 0.2) s.pulse *= -1;
            ctx.globalAlpha = s.o; ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc((s.x - 0.5)*w*2.5, (s.y - 0.5)*h*2.5, s.s, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();

        ctx.save(); ctx.translate(cx, cy); ctx.rotate(stationRotation);

        // Anel da estação
        ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2);
        ctx.strokeStyle = "#0f172a"; ctx.lineWidth = thickness; ctx.stroke();

        // Portais
        currentActivePortal = null;
        portals.forEach(p => { if (drawPortal(p)) currentActivePortal = p; });

        // Chão e teto
        ctx.beginPath(); ctx.arc(0, 0, radius + thickness/2, 0, Math.PI*2);
        ctx.strokeStyle = "#64748b"; ctx.lineWidth = 6; ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, radius - thickness/2, 0, Math.PI*2);
        ctx.strokeStyle = "#64748b"; ctx.lineWidth = 6; ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, radius - thickness/2 + 4, 0, Math.PI*2);
        ctx.strokeStyle = "rgba(0,242,255,0.2)"; ctx.lineWidth = 1; ctx.stroke();

        // Astronauta
        ctx.save();
        ctx.rotate(playerAngle);
        ctx.translate(radius + thickness/2 - 12.5, 0);
        ctx.rotate(-Math.PI / 2);
        drawAstronaut(time, velocity);
        ctx.restore();

        ctx.restore();

        // ── HUD: actualiza nome, descrição e botão central ─────────────────
        if (currentActivePortal) {
            pName.innerText       = currentActivePortal.name;
            pName.style.color     = currentActivePortal.color;
            pName.style.textShadow = `0 0 15px ${currentActivePortal.color}`;
            pDesc.innerText       = currentActivePortal.desc;
            pInfo.classList.add('visible');
            trigger.classList.add('active');
            trigger.style.background = currentActivePortal.color;

            // Texto do botão muda consoante o estado da porta
            if (currentActivePortal.isLocked) {
                trigger.innerHTML = "<b>INICIAR<br>PUZZLE</b>";   // porta trancada
            } else {
                trigger.innerHTML = "<b>ENTRAR<br>SECTOR</b>";    // porta desbloqueada
            }
        } else {
            pInfo.classList.remove('visible');
            trigger.classList.remove('active');
        }

        const angDeg = ((playerAngle * 180 / Math.PI) % 360 + 360) % 360;
        posDisplay.innerText = `LAT: ${(Math.sin(time)*0.01).toFixed(4)} // LNG: ${angDeg.toFixed(1)}°`;

        requestAnimationFrame(loop);
    }

    window.addEventListener('click', ensureAudio);
    window.onload = loop;
</script>

</body>
