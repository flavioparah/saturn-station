<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIMEWAYS - Estação Orbital</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #010205; 
            --panel: rgba(15, 23, 42, 0.9);
            --floor-grey: #64748b;
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #stage { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-top {
            position: absolute; 
            top: 50px; 
            left: 30px;
            border-left: 4px solid var(--neon);
            padding-left: 15px; 
            z-index: 100;
            text-shadow: 0 0 10px var(--neon);
        }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; font-weight: 400; }
        .value { font-weight: 900; font-size: 18px; color: var(--neon); letter-spacing: 2px; }

        #portal-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
        }
        #portal-info.visible { opacity: 1; }

        #portal-name { 
            font-size: 14px; 
            letter-spacing: 3px; 
            font-weight: 900; 
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        #portal-desc { 
            font-size: 8px; 
            opacity: 0.7; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }

        .controls-container {
            position: absolute; 
            bottom: 100px; 
            width: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 25px;
            z-index: 100;
        }
        
        .nav-btn {
            width: 60px; 
            height: 60px;
            background: var(--panel);
            border: 1px solid rgba(0,242,255,0.2);
            border-radius: 50%; 
            color: var(--neon);
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 18px; 
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .nav-btn:active { background: var(--neon); color: black; }

        #portal-trigger {
            width: 100px;
            height: 100px;
            background: var(--neon);
            color: #000; 
            border: none;
            border-radius: 50%; 
            font-weight: 900;
            font-size: 9px; 
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
            opacity: 0;
            line-height: 1.2;
            text-align: center;
        }
        
        #portal-trigger.active { transform: scale(1); opacity: 1; }

        .coords {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 10px;
            color: var(--neon);
            opacity: 0.4;
            letter-spacing: 1px;
            z-index: 100;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="stage">
    <div id="ui-top">
        <div class="label">CONTROLO DE ACESSO</div>
        <div class="value">STATUS: OPERACIONAL</div>
    </div>

    <div id="portal-info">
        <div id="portal-name">SECTOR</div>
        <div id="portal-desc">AGUARDANDO INPUT</div>
    </div>

    <div class="controls-container">
        <div id="btn-left" class="nav-btn">◀</div>
        <button id="portal-trigger"><b>INICIAR<br>PUZZLE</b></button>
        <div id="btn-right" class="nav-btn">▶</div>
    </div>

    <div class="coords" id="pos-display">LAT: 0.000 // LNG: 0.000</div>
    <canvas id="game"></canvas>
</div>

<script>
    let audioCtx = null;

    function ensureAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } else if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSynthSound(freq, duration, volume = 0.1, type = 'sine') {
        if (!audioCtx) return;
        ensureAudio();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(volume, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playDoorSound() {
        if (!audioCtx) return;
        ensureAudio();
        const noise = audioCtx.createOscillator();
        const filter = audioCtx.createBiquadFilter();
        const g = audioCtx.createGain();
        
        noise.type = 'sawtooth';
        noise.frequency.setValueAtTime(40, audioCtx.currentTime);
        noise.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.6);
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(400, audioCtx.currentTime);
        
        g.gain.setValueAtTime(0.08, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
        
        noise.connect(filter);
        filter.connect(g);
        g.connect(audioCtx.destination);
        
        noise.start();
        noise.stop(audioCtx.currentTime + 0.6);
    }

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const trigger = document.getElementById('portal-trigger');
    const pInfo = document.getElementById('portal-info');
    const pName = document.getElementById('portal-name');
    const pDesc = document.getElementById('portal-desc');
    const posDisplay = document.getElementById('pos-display');

    let w, h, cx, cy, radius, thickness;
    
    // POSIÇÃO INICIAL: Alinhada com o Estaleiro (portal amarelo)
    let playerAngle = ((Math.PI * 2) / 6) * 2; 
    
    let stationRotation = 0; 
    let velocity = 0;
    let input = 0; // Armazena a direção do movimento (-1, 0, 1)
    let time = 0;
    let currentActivePortal = null;

    // Estado das teclas para movimento suave
    const keys = {
        left: false,
        right: false
    };

    const stars = Array.from({length: 150}, () => ({
        x: Math.random(), 
        y: Math.random(), 
        s: Math.random() * 2 + 0.5, 
        o: Math.random(),
        pulse: Math.random() * 0.02
    }));

    const portals = [
        { id: 'nucleo', angle: 0, name: "NÚCLEO TÉRMICO", color: "#00f2ff", desc: "SISTEMA TRANCADO", state: 0, isLocked: false, url: "nucleo_termico.html" },
        { id: 'hbitat', angle: (Math.PI*2)/6, name: "HABITAT", color: "#4ade80", desc: "ACESSO NEGADO", state: 0, isLocked: false, url: "habitat.html" },
        { id: 'estaleiro', angle: ((Math.PI*2)/6)*2, name: "ESTALEIRO", color: "#fbbf24", desc: "ACESSO LIVRE", state: 0, isLocked: false, url: "locker1.html" },
        { id: 'ciro-lab', angle: ((Math.PI*2)/6)*3, name: "CRIO-LAB", color: "#a855f7", desc: "BLOQUEIO ATIVO", state: 0, isLocked: false, url: "crio_lab.html" },
        { id: 'bio-dome', angle: ((Math.PI*2)/6)*4, name: "BIO-DOME", color: "#22c55e", desc: "SISTEMA EM ESPERA", state: 0, isLocked: false, url: "bio_dome.html" },
        { id: 'comando', angle: ((Math.PI*2)/6)*5, name: "COMANDO", color: "#ff4444", desc: "ENCRIPTADO", state: 0, isLocked: false, url: "locker2.html" }
    ];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        cx = w / 2; cy = h / 2;
        radius = Math.min(w, h) * 0.35;
        thickness = radius * 0.45; 
    }

    // Configuração de inputs (Mouse/Touch)
    const setupInput = (id, val) => {
        const el = document.getElementById(id);
        const start = (e) => { 
            e.preventDefault(); 
            input = val; 
            ensureAudio();
            playSynthSound(150 + Math.random()*20, 0.1, 0.01);
        };
        const end = () => { if(input === val) input = 0; };
        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mouseup', end);
        window.addEventListener('touchend', end);
    };
    
    setupInput('btn-left', 1);   
    setupInput('btn-right', -1); 

    // Configuração de Teclado (A, D, Setas e ENTER)
    window.addEventListener('keydown', (e) => {
        ensureAudio();
        // Movimento
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
        
        // Ação Central (Enter)
        if (e.code === 'Enter' || e.code === 'NumpadEnter') {
            if (trigger.classList.contains('active')) {
                trigger.click(); // Simula o clique no botão
            }
        }
        
        updateKeyboardInput();
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
        updateKeyboardInput();
    });

    function updateKeyboardInput() {
        if (keys.left && !keys.right) input = 1;
        else if (keys.right && !keys.left) input = -1;
        else input = 0;
    }

    // Função de ação do portal
    trigger.onclick = () => {
        if(!currentActivePortal) return;
        ensureAudio();
        playSynthSound(440, 0.2, 0.05, 'square');
        
        if (currentActivePortal.isLocked) {
            console.log("Iniciando puzzle para:", currentActivePortal.name);
            // Aqui você pode redirecionar para uma página de puzzle ou abrir um modal
            // window.location.href = "puzzle_" + currentActivePortal.id + ".html";
        } else {
            if (currentActivePortal.url && currentActivePortal.url !== "#") {
                window.location.href = currentActivePortal.url;
            } else {
                console.log("Setor aberto, mas sem URL configurada.");
            }
        }
    };

    function drawAstronaut(t, vel) {
        ctx.save();
        const moving = Math.abs(vel) > 0.0005;
        const animSpeed = 10;
        const walkPhase = moving ? Math.sin(t * animSpeed) : 0;
        if (vel < -0.0001) ctx.scale(1, 1);
        else if (vel > 0.0001) ctx.scale(-1, 1);
        const s = (radius / 220); 
        ctx.scale(s, s);
        
        const white = "#ffffff";
        const bodyGrey = "#cbd5e1";
        const helmetDark = "#0f172a";
        const highlight = "#00f2ff";
        
        ctx.save();
        ctx.translate(-5.5, -2);
        ctx.rotate(moving ? walkPhase * 0.6 : 0);
        ctx.fillStyle = bodyGrey;
        ctx.beginPath();
        ctx.roundRect(-4.4, 0, 8.8, 17.6, [1, 1, 4, 4]); ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.translate(5.5, -2);
        ctx.rotate(moving ? -walkPhase * 0.6 : 0);
        ctx.fillStyle = white;
        ctx.beginPath();
        ctx.roundRect(-4.4, 0, 8.8, 17.6, [1, 1, 4, 4]); ctx.fill();
        ctx.restore();

        ctx.save();
        const bounce = moving ? Math.abs(Math.sin(t * animSpeed)) * 1.2 : 0;
        ctx.translate(0, -bounce - 2);
        ctx.fillStyle = "#334155";
        ctx.roundRect(-14, -28, 10, 24, 4); ctx.fill();
        ctx.fillStyle = white;
        ctx.roundRect(-12, -32, 24, 32, [8, 8, 4, 4]); ctx.fill();
        ctx.fillStyle = highlight;
        ctx.globalAlpha = 0.5 + Math.sin(t*5)*0.5;
        ctx.fillRect(-5, -22, 10, 2);
        ctx.globalAlpha = 1;

        ctx.save();
        ctx.translate(-10, -25);
        ctx.rotate(moving ? -walkPhase * 0.8 : 0.2);
        ctx.fillStyle = bodyGrey;
        ctx.roundRect(-3.3, 0, 6.6, 19.8, 4); ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.translate(10, -25);
        ctx.rotate(moving ? walkPhase * 0.8 : -0.2);
        ctx.fillStyle = white;
        ctx.roundRect(-3.3, 0, 6.6, 19.8, 4); ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.translate(0, -38);
        ctx.fillStyle = white;
        ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = helmetDark;
        ctx.beginPath(); ctx.ellipse(4, -1, 11, 8, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore(); 
        ctx.restore(); 
        ctx.restore(); 
    }

    function drawPortal(p) {
        ctx.save();
        ctx.rotate(p.angle);
        
        const portalWidth = thickness * 0.55; 
        const normalizedPlayer = (playerAngle % (Math.PI*2) + (Math.PI*2)) % (Math.PI*2);
        const normalizedPortal = (p.angle % (Math.PI*2) + (Math.PI*2)) % (Math.PI*2);
        
        const panelOffset = 0.12; 
        let distToPanel = Math.abs(normalizedPlayer - (normalizedPortal + panelOffset));
        if(distToPanel > Math.PI) distToPanel = Math.PI*2 - distToPanel;
        const isNearPanel = distToPanel < 0.1;

        let distToDoor = Math.abs(normalizedPlayer - normalizedPortal);
        if(distToDoor > Math.PI) distToDoor = Math.PI*2 - distToDoor;
        const isNearDoor = distToDoor < 0.2;

        const wasClosed = p.state === 0;

        if (!p.isLocked && isNearDoor) {
            p.state = Math.min(1, p.state + 0.05);
            if(wasClosed && p.state > 0) playDoorSound();
        } else {
            p.state = Math.max(0, p.state - 0.05);
        }

        ctx.fillStyle = "#010205"; 
        ctx.fillRect(radius - thickness/2 + 2, -portalWidth/2, thickness - 4, portalWidth);

        if (!p.isLocked && p.state > 0) {
            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = p.color;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 4;
            ctx.globalAlpha = 0.4 + p.state * 0.6;
            ctx.strokeRect(radius - thickness/2, -portalWidth/2 - 2, thickness, portalWidth + 4);
            ctx.restore();
        }

        ctx.save();
        ctx.translate(radius - thickness/2 + 20, portalWidth/2 + 12);
        
        const showOutline = p.id !== 'estaleiro' && p.isLocked && isNearPanel;
        
        if(showOutline) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(-4, -4, 18, 28);
        }
        
        ctx.fillStyle = "#1e293b";
        ctx.beginPath(); 
        ctx.roundRect(0, 0, 10, 20, 2); 
        ctx.fill();
        
        const lightOn = p.id === 'estaleiro' || (p.isLocked && isNearPanel) || (!p.isLocked && isNearDoor);
        
        if(lightOn) {
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = 0.7 + Math.sin(time * 5) * 0.3;
            ctx.fillRect(2, 4, 6, 4);
            ctx.restore();
        } else {
            ctx.fillStyle = "#334155";
            ctx.fillRect(2, 4, 6, 4);
        }
        ctx.restore();

        ctx.save();
        ctx.beginPath(); ctx.rect(radius - thickness/2 + 2, -portalWidth/2, thickness - 4, portalWidth); ctx.clip();
        const slide = p.state * (portalWidth / 2);
        ctx.fillStyle = "#1e293b"; 
        ctx.fillRect(radius - thickness/2 + 2, -portalWidth/2 - slide, thickness, portalWidth/2);
        ctx.fillRect(radius - thickness/2 + 2, 0 + slide, thickness, portalWidth/2);
        
        ctx.fillStyle = p.isLocked ? "#ff4444" : "#00f2ff";
        ctx.globalAlpha = 0.3 * (1 - p.state); 
        if (ctx.globalAlpha > 0) {
            ctx.fillRect(radius - thickness/2 + 2, -2, thickness - 4, 4);
        }
        ctx.restore();

        ctx.restore();
        
        return p.isLocked ? isNearPanel : isNearDoor;
    }

    function loop() {
        resize();
        time += 0.016;
        stationRotation += 0.0025; 
        playerAngle += velocity;
        velocity += input * 0.0012; 
        velocity *= 0.85; 

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#010205";
        ctx.fillRect(0, 0, w, h);
        
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(stationRotation * 0.15);
        stars.forEach(s => {
            s.o += s.pulse;
            if(s.o > 1 || s.o < 0.2) s.pulse *= -1;
            ctx.globalAlpha = s.o;
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc((s.x - 0.5) * w * 2.5, (s.y - 0.5) * h * 2.5, s.s, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(stationRotation);
        
        // Estrutura principal da estação
        ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2);
        ctx.strokeStyle = "#0f172a"; ctx.lineWidth = thickness; ctx.stroke();

        currentActivePortal = null; 
        portals.forEach(p => { 
            if(drawPortal(p)) currentActivePortal = p; 
        });

        // LINHA DO CHÃO (Externa)
        ctx.beginPath(); ctx.arc(0, 0, radius + thickness/2, 0, Math.PI * 2);
        ctx.strokeStyle = "#64748b"; ctx.lineWidth = 6; ctx.stroke();
        
        // LINHA DO TETO (Interna)
        ctx.beginPath(); ctx.arc(0, 0, radius - thickness/2, 0, Math.PI * 2);
        ctx.strokeStyle = "#64748b"; ctx.lineWidth = 6; ctx.stroke();

        // Detalhe de luz neon no teto
        ctx.beginPath(); ctx.arc(0, 0, radius - thickness/2 + 4, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(0, 242, 255, 0.2)"; ctx.lineWidth = 1; ctx.stroke();

        ctx.save();
        ctx.rotate(playerAngle);
        ctx.translate(radius + thickness/2 - 12.5, 0); ctx.rotate(-Math.PI / 2); 
        drawAstronaut(time, velocity);
        ctx.restore();
        ctx.restore();

        if(currentActivePortal) {
            pName.innerText = currentActivePortal.name; 
            pName.style.color = currentActivePortal.color;
            pName.style.textShadow = `0 0 15px ${currentActivePortal.color}`;
            pDesc.innerText = currentActivePortal.desc; 
            pInfo.classList.add('visible');
            trigger.classList.add('active');
            trigger.style.background = currentActivePortal.color;
            
            if (currentActivePortal.isLocked) {
                trigger.innerHTML = "<b>INICIAR<br>PUZZLE</b>";
            } else {
                trigger.innerHTML = "<b>INGRESSAR<br>SETOR</b>";
            }
        } else {
            pInfo.classList.remove('visible'); 
            trigger.classList.remove('active');
        }

        const angDeg = ((playerAngle * 180 / Math.PI) % 360 + 360) % 360;
        posDisplay.innerText = `LAT: ${(Math.sin(time)*0.01).toFixed(4)} // LNG: ${angDeg.toFixed(1)}°`;

        requestAnimationFrame(loop);
    }

    window.addEventListener('click', ensureAudio);
    window.onload = loop;
</script>

</body>
</html>
