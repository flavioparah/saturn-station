<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIMEWAYS - Estação Orbital</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #010205; /* Preto espacial profundo */
            --panel: rgba(15, 23, 42, 0.9);
            --floor-grey: #64748b;
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #stage { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #stage::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 0%, 
                rgba(0, 0, 0, 0.15) 50%, 
                rgba(18, 16, 16, 0) 100%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 200;
            opacity: 0.5;
        }

        #ui-top {
            position: absolute; 
            top: 50px; 
            left: 30px;
            border-left: 4px solid var(--neon);
            padding-left: 15px; 
            z-index: 100;
            text-shadow: 0 0 10px var(--neon);
        }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; font-weight: 400; }
        .value { font-weight: 900; font-size: 18px; color: var(--neon); letter-spacing: 2px; }

        #portal-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
        }
        #portal-info.visible { opacity: 1; }

        #portal-name { 
            font-size: 14px; 
            letter-spacing: 3px; 
            font-weight: 900; 
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        #portal-desc { 
            font-size: 8px; 
            opacity: 0.7; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }

        .controls-container {
            position: absolute; 
            bottom: 60px; 
            width: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 25px;
            z-index: 100;
        }
        
        .nav-btn {
            width: 60px; 
            height: 60px;
            background: var(--panel);
            border: 1px solid rgba(0,242,255,0.2);
            border-radius: 50%; 
            color: var(--neon);
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 18px; 
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .nav-btn:active { background: var(--neon); color: black; }

        #portal-trigger {
            width: 90px;
            height: 90px;
            background: var(--neon);
            color: #000; 
            border: none;
            border-radius: 50%; 
            font-weight: 900;
            font-size: 9px; 
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
            opacity: 0;
            line-height: 1.2;
        }
        
        #portal-trigger.active { transform: scale(1); opacity: 1; }

        #flash {
            position: fixed; 
            inset: 0;
            background: var(--neon); 
            opacity: 0;
            pointer-events: none; 
            z-index: 1000;
        }

        .coords {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 10px;
            color: var(--neon);
            opacity: 0.4;
            letter-spacing: 1px;
            z-index: 100;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="flash"></div>

<div id="stage">
    <div id="ui-top">
        <div class="label">ESTAÇÃO ORBITAL</div>
        <div class="value">ASTRUM-X // REV 23.0</div>
    </div>

    <div id="portal-info">
        <div id="portal-name">SETOR ATIVO</div>
        <div id="portal-desc">SISTEMA PRONTO</div>
    </div>

    <div class="controls-container">
        <div id="btn-left" class="nav-btn">◀</div>
        <button id="portal-trigger"><b>ENTRAR<br>SETOR</b></button>
        <div id="btn-right" class="nav-btn">▶</div>
    </div>

    <div class="coords" id="pos-display">LAT: 0.000 // LNG: 0.000</div>

    <canvas id="game"></canvas>
</div>

<script>
    // --- SISTEMA DE ÁUDIO ---
    let audioCtx = null;

    function ensureAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } else if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSynthSound(freq, duration, volume = 0.1, type = 'sine') {
        if (!audioCtx) return;
        ensureAudio();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(volume, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playDoorEffect(isOpen) {
        if (!audioCtx) return;
        ensureAudio();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'square';
        if(isOpen) {
            osc.frequency.setValueAtTime(80, now);
            osc.frequency.exponentialRampToValueAtTime(220, now + 0.4);
        } else {
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(60, now + 0.3);
        }
        g.gain.setValueAtTime(0.05, now);
        g.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(now + 0.4);
    }

    // --- LÓGICA DO CANVAS ---
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const trigger = document.getElementById('portal-trigger');
    const pInfo = document.getElementById('portal-info');
    const pName = document.getElementById('portal-name');
    const pDesc = document.getElementById('portal-desc');
    const flash = document.getElementById('flash');
    const posDisplay = document.getElementById('pos-display');

    let w, h, cx, cy, radius, thickness;
    let playerAngle = Math.PI * 1.5; 
    let stationRotation = 0; 
    let velocity = 0;
    let input = 0;
    let isWarping = false;
    let time = 0;

    const stars = Array.from({length: 150}, () => ({
        x: Math.random(), 
        y: Math.random(), 
        s: Math.random() * 2 + 0.5, 
        o: Math.random(),
        pulse: Math.random() * 0.02
    }));

    const portals = [
        { angle: 0, name: "NÚCLEO TÉRMICO", color: "#00f2ff", desc: "REATOR DE FUSÃO", state: 0, lastState: 0 },
        { angle: (Math.PI*2)/6, name: "HABITAT", color: "#4ade80", desc: "SETOR RESIDENCIAL", state: 0, lastState: 0 },
        { angle: ((Math.PI*2)/6)*2, name: "ESTALEIRO", color: "#fbbf24", desc: "HANGAR DE CARGA", state: 0, lastState: 0 },
        { angle: ((Math.PI*2)/6)*3, name: "CRIO-LAB", color: "#a855f7", desc: "ZONA EXPERIMENTAL", state: 0, lastState: 0 },
        { angle: ((Math.PI*2)/6)*4, name: "BIO-DOME", color: "#22c55e", desc: "RESERVAS DE OXIGÉNIO", state: 0, lastState: 0 },
        { angle: ((Math.PI*2)/6)*5, name: "COMANDO", color: "#ff4444", desc: "PONTE DE OPERAÇÕES", state: 0, lastState: 0 }
    ];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        cx = w / 2; cy = h / 2;
        radius = Math.min(w, h) * 0.35;
        thickness = radius * 0.45; 
    }

    const setupInput = (id, val) => {
        const el = document.getElementById(id);
        const start = (e) => { 
            e.preventDefault(); 
            input = val; 
            ensureAudio();
            playSynthSound(200 + Math.random()*50, 0.1, 0.02);
        };
        const end = () => input = 0;
        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mouseup', end);
        window.addEventListener('touchend', end);
    };
    
    setupInput('btn-left', 1);   
    setupInput('btn-right', -1); 

    trigger.onclick = () => {
        if(isWarping) return;
        ensureAudio();
        isWarping = true;
        playSynthSound(880, 0.3, 0.1, 'sine');
        flash.style.transition = 'none';
        flash.style.opacity = '1';
        setTimeout(() => {
            flash.style.transition = 'opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
            flash.style.opacity = '0';
            setTimeout(() => isWarping = false, 1200);
        }, 50);
    };

    function drawAstronaut(t, vel) {
        ctx.save();
        const moving = Math.abs(vel) > 0.0005;
        const animSpeed = 10;
        const walkPhase = moving ? Math.sin(t * animSpeed) : 0;
        if (vel < -0.0001) ctx.scale(1, 1);
        else if (vel > 0.0001) ctx.scale(-1, 1);
        const s = (radius / 220); 
        ctx.scale(s, s);
        const white = "#ffffff";
        const bodyGrey = "#cbd5e1";
        const helmetDark = "#0f172a";
        const highlight = "#00f2ff";
        
        ctx.save();
        ctx.translate(-5.5, -2);
        ctx.rotate(moving ? walkPhase * 0.6 : 0);
        ctx.fillStyle = bodyGrey;
        ctx.beginPath();
        ctx.roundRect(-4.4, 0, 8.8, 17.6, [1, 1, 4, 4]); 
        ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.translate(5.5, -2);
        ctx.rotate(moving ? -walkPhase * 0.6 : 0);
        ctx.fillStyle = white;
        ctx.beginPath();
        ctx.roundRect(-4.4, 0, 8.8, 17.6, [1, 1, 4, 4]);
        ctx.fill();
        ctx.restore();

        ctx.save();
        const bounce = moving ? Math.abs(Math.sin(t * animSpeed)) * 1.2 : 0;
        ctx.translate(0, -bounce - 2);
        ctx.fillStyle = "#334155";
        ctx.roundRect(-14, -28, 10, 24, 4);
        ctx.fill();
        ctx.fillStyle = white;
        ctx.roundRect(-12, -32, 24, 32, [8, 8, 4, 4]);
        ctx.fill();
        ctx.fillStyle = highlight;
        ctx.globalAlpha = 0.5 + Math.sin(t*5)*0.5;
        ctx.fillRect(-5, -22, 10, 2);
        ctx.globalAlpha = 1;

        ctx.save();
        ctx.translate(-10, -25);
        ctx.rotate(moving ? -walkPhase * 0.8 : 0.2);
        ctx.fillStyle = bodyGrey;
        ctx.roundRect(-3.3, 0, 6.6, 19.8, 4);
        ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.translate(10, -25);
        ctx.rotate(moving ? walkPhase * 0.8 : -0.2);
        ctx.fillStyle = white;
        ctx.roundRect(-3.3, 0, 6.6, 19.8, 4);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.translate(0, -38);
        ctx.fillStyle = white;
        ctx.beginPath();
        ctx.arc(0, 0, 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = helmetDark;
        ctx.beginPath();
        ctx.ellipse(4, -1, 11, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore(); 
        ctx.restore(); 
        ctx.restore(); 
    }

    function drawPortal(p) {
        ctx.save();
        ctx.rotate(p.angle);
        const normalizedPlayer = (playerAngle % (Math.PI*2) + (Math.PI*2)) % (Math.PI*2);
        const normalizedPortal = (p.angle % (Math.PI*2) + (Math.PI*2)) % (Math.PI*2);
        let dist = Math.abs(normalizedPlayer - normalizedPortal);
        if(dist > Math.PI) dist = Math.PI*2 - dist;
        const isOver = dist < 0.25;
        p.state = isOver ? Math.min(1, p.state + 0.035) : Math.max(0, p.state - 0.035);
        if (p.state > 0.05 && p.lastState <= 0.05) playDoorEffect(true);
        if (p.state < 0.05 && p.lastState >= 0.05) playDoorEffect(false);
        p.lastState = p.state;
        const portalWidth = thickness * 0.55; 

        // Painel Lateral de Controle
        ctx.save();
        ctx.translate(radius - thickness/2 + 20, portalWidth/2 + 12);
        ctx.fillStyle = "#1e293b";
        ctx.beginPath(); ctx.roundRect(0, 0, 10, 20, 2); ctx.fill();
        ctx.fillStyle = p.color; ctx.globalAlpha = 0.6 + Math.sin(time * 3) * 0.3;
        ctx.fillRect(2, 4, 6, 4);
        ctx.restore();

        // Novo: Contorno Brilhante da Cor do Botão quando aberto
        if(p.state > 0.01) {
            ctx.save();
            ctx.shadowBlur = 10 * p.state;
            ctx.shadowColor = p.color;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2 * p.state;
            ctx.globalAlpha = p.state * 0.8;
            // Desenha o retângulo do contorno
            ctx.strokeRect(radius - thickness/2, -portalWidth/2 - 2, thickness, portalWidth + 4);
            ctx.restore();
        }

        // Fundo Escuro do Vão
        ctx.fillStyle = "#010205";
        ctx.fillRect(radius - thickness/2 + 2, -portalWidth/2, thickness - 4, portalWidth);

        // Painéis da Porta Deslizantes
        ctx.save();
        ctx.beginPath(); ctx.rect(radius - thickness/2 + 2, -portalWidth/2, thickness - 4, portalWidth); ctx.clip();
        const slide = p.state * (portalWidth / 2);
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(radius - thickness/2 + 2, -portalWidth/2 - slide, thickness, portalWidth/2);
        ctx.fillRect(radius - thickness/2 + 2, 0 + slide, thickness, portalWidth/2);
        
        // Detalhe de luz na borda da porta que abre
        if(p.state > 0) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.state * 0.5;
            ctx.fillRect(radius - thickness/2 + 2, -portalWidth/2 + slide - 1, thickness - 4, 2);
            ctx.fillRect(radius - thickness/2 + 2, portalWidth/2 - slide - 1, thickness - 4, 2);
        }
        ctx.restore();

        ctx.restore();
        return isOver;
    }

    function loop() {
        resize();
        time += 0.016;
        stationRotation += 0.0025; 
        playerAngle += velocity;
        velocity += input * 0.0012; 
        velocity *= 0.85; 

        // Limpeza do frame
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#010205";
        ctx.fillRect(0, 0, w, h);
        
        // Estrelas
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(stationRotation * 0.15);
        stars.forEach(s => {
            s.o += s.pulse;
            if(s.o > 1 || s.o < 0.2) s.pulse *= -1;
            ctx.globalAlpha = s.o;
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc((s.x - 0.5) * w * 2.5, (s.y - 0.5) * h * 2.5, s.s, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();

        // Estação
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(stationRotation);
        
        // Base Circular da Estação
        ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI*2);
        ctx.strokeStyle = "#0f172a"; ctx.lineWidth = thickness; ctx.stroke();

        let activePortal = null; 
        portals.forEach(p => { if(drawPortal(p)) activePortal = p; });

        // Trilhos de Contorno
        ctx.beginPath(); ctx.arc(0, 0, radius + thickness/2, 0, Math.PI * 2);
        ctx.strokeStyle = "#64748b"; ctx.lineWidth = 6; ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, radius - thickness/2, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(0, 242, 255, 0.3)"; ctx.lineWidth = 2; ctx.stroke();

        // Astronauta
        ctx.save();
        ctx.rotate(playerAngle);
        ctx.translate(radius + thickness/2 - 12.5, 0); ctx.rotate(-Math.PI / 2); 
        drawAstronaut(time, velocity);
        ctx.restore();
        ctx.restore();

        // UI de Interação
        if(activePortal) {
            pName.innerText = activePortal.name; 
            pName.style.color = activePortal.color;
            pName.style.textShadow = `0 0 15px ${activePortal.color}`;
            pDesc.innerText = activePortal.desc; 
            pInfo.classList.add('visible');
            trigger.classList.add('active');
            trigger.style.background = activePortal.color;
            trigger.style.boxShadow = `0 0 40px ${activePortal.color}66`;
        } else {
            pInfo.classList.remove('visible'); 
            trigger.classList.remove('active');
        }

        const angDeg = ((playerAngle * 180 / Math.PI) % 360 + 360) % 360;
        posDisplay.innerText = `LAT: ${(Math.sin(time)*0.01).toFixed(4)} // LNG: ${angDeg.toFixed(1)}°`;

        requestAnimationFrame(loop);
    }

    window.addEventListener('click', ensureAudio);
    window.onload = loop;
</script>

</body>
</html>
