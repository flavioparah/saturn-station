<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Dome - Terminal de Aço</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bio-green: #22c55e;
            --bio-dark: #052e16;
            --steel: #2c2c2e;
            --steel-light: #48484a;
            --accent: #facc15;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Chassis em Aço Escovado */
        .steel-chassis {
            position: relative;
            width: 95vw;
            max-width: 500px;
            background: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),
                linear-gradient(135deg, #3a3a3c 0%, #1a1a1c 100%);
            background-blend-mode: overlay;
            border: 4px solid #444;
            border-radius: 8px;
            padding: 40px 20px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 2px 2px 0 rgba(255,255,255,0.1);
        }

        .screw {
            position: absolute;
            width: 16px; height: 16px;
            background: radial-gradient(circle at 30% 30%, #666, #222);
            border-radius: 50%;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .screw::after {
            content: '';
            position: absolute; width: 80%; height: 2px;
            background: #111; top: 45%; left: 10%;
            transform: rotate(45deg);
        }
        .tl { top: 15px; left: 15px; }
        .tr { top: 15px; right: 15px; }
        .bl { bottom: 15px; left: 15px; }
        .br { bottom: 15px; right: 15px; }

        /* Ecrã Digital */
        .digital-screen {
            background: #020602;
            border: 10px solid #111;
            border-radius: 4px;
            position: relative;
            height: 320px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(34, 197, 94, 0.1);
        }

        .digital-screen::before {
            content: "";
            position: absolute; inset: 0;
            background: repeating-linear-gradient(rgba(34, 197, 94, 0.03) 0px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 20;
        }

        .flow-container {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            height: 180px;
            z-index: 5;
            width: 85%;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .track {
            flex: 1;
            max-width: 45px;
            height: 100%;
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            background: var(--bio-green);
            box-shadow: 0 0 15px var(--bio-green);
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .target-zone {
            position: absolute;
            top: 40%;
            width: 100%;
            height: 20px;
            background: rgba(250, 204, 21, 0.1);
            border-top: 1px dashed var(--accent);
            border-bottom: 1px dashed var(--accent);
            pointer-events: none;
        }

        .metal-btn {
            background: linear-gradient(180deg, #444, #222);
            border: 1px solid #111;
            border-bottom: 4px solid #000;
            color: #888;
            padding: 12px 2px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            font-family: 'JetBrains Mono', monospace;
        }

        .metal-btn:active:not(:disabled) {
            border-bottom-width: 1px;
            transform: translateY(3px);
            color: var(--bio-green);
            background: #111;
        }

        .metal-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .success-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #020602;
            z-index: 30;
            text-align: center;
            animation: screenIn 0.4s ease-out;
        }

        @keyframes screenIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="steel-chassis">
        <div class="screw tl"></div>
        <div class="screw tr"></div>
        <div class="screw bl"></div>
        <div class="screw br"></div>

        <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-2">
            <div>
                <h1 class="text-[10px] font-black tracking-widest text-gray-400 uppercase">UNIDADE BIO-COMANDO</h1>
                <p class="text-[8px] font-mono text-gray-600 uppercase">Calibração de Áudio & Fluxo</p>
            </div>
            <div id="status-led" class="flex items-center gap-2">
                <span id="led-text" class="text-[8px] text-yellow-600 font-bold">AJUSTE REQUERIDO</span>
                <div id="led-bulb" class="w-2 h-2 rounded-full bg-yellow-600 animate-pulse"></div>
            </div>
        </div>

        <div class="digital-screen">
            <div id="game-view" class="flow-container">
                <div class="track"><div id="bar-1" class="bar" style="height: 15%;"></div><div class="target-zone"></div></div>
                <div class="track"><div id="bar-2" class="bar" style="height: 85%;"></div><div class="target-zone"></div></div>
                <div class="track"><div id="bar-3" class="bar" style="height: 40%;"></div><div class="track-info"></div><div class="target-zone"></div></div>
                <div class="track"><div id="bar-4" class="bar" style="height: 60%;"></div><div class="target-zone"></div></div>
            </div>

            <div id="game-subtext" class="mt-8 text-[9px] font-mono opacity-30 text-green-500 uppercase tracking-widest">
                Feedback Acústico Ativo
            </div>

            <div id="success-view" class="success-content hidden">
                <div class="text-green-500 font-bold text-2xl mb-2 tracking-tighter">BIO-DOME ACESSÍVEL</div>
                <div class="w-16 h-[2px] bg-green-900 mb-6"></div>
                <div class="text-[9px] font-mono text-green-800 mb-8 uppercase tracking-widest leading-loose">
                    Sincronização: 100%<br>
                    Frequência: Estável<br>
                    ID: BIODOME_READY
                </div>
                <button onclick="finalizar()" class="px-8 py-3 bg-green-600 text-black font-black uppercase text-[10px] tracking-widest hover:bg-green-400 transition-all shadow-[0_0_20px_rgba(34,197,94,0.3)]">
                    Confirmar Entrada
                </button>
            </div>
        </div>

        <div id="interface-btns" class="grid grid-cols-4 gap-2">
            <button class="metal-btn" onclick="adjust(1)">MOD_01</button>
            <button class="metal-btn" onclick="adjust(2)">MOD_02</button>
            <button class="metal-btn" onclick="adjust(3)">MOD_03</button>
            <button class="metal-btn" onclick="adjust(4)">MOD_04</button>
        </div>

        <div class="mt-4 flex justify-between text-[7px] font-mono text-gray-700 uppercase">
            <span>Audio_Engine: WebAudio_V2</span>
            <span>OS: Bio_Shell_RT</span>
        </div>
    </div>

    <script>
        const state = { v1: 15, v2: 85, v3: 40, v4: 60 };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Sistema de Feedback Auditivo
        function playTone(freq, type, volume, duration) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function playSuccessSequence() {
            const now = audioCtx.currentTime;
            const freqs = [523.25, 659.25, 783.99, 1046.50]; // Acorde C Maior
            freqs.forEach((f, i) => {
                setTimeout(() => playTone(f, 'sine', 0.1, 0.5), i * 150);
            });
        }

        function adjust(id) {
            // Som do botão (clique mecânico)
            playTone(150 + (id * 40), 'square', 0.05, 0.1);
            
            const prevStates = { ...state };

            if (id === 1) {
                state.v1 = (state.v1 + 12) % 105;
                state.v2 = (state.v2 + 8) % 105;
            } else if (id === 2) {
                state.v2 = (state.v2 + 12) % 105;
                state.v3 = (state.v3 + 5) % 105;
                state.v1 = Math.max(0, state.v1 - 4);
            } else if (id === 3) {
                state.v3 = (state.v3 + 12) % 105;
                state.v4 = (state.v4 + 10) % 105;
                state.v2 = Math.max(0, state.v2 - 8);
            } else if (id === 4) {
                state.v4 = (state.v4 + 12) % 105;
                state.v1 = (state.v1 + 6) % 105;
                state.v3 = Math.max(0, state.v3 - 5);
            }

            render();
            
            // Som de "Alinhamento" se uma barra entrou na zona
            const isOk = (v) => v >= 42 && v <= 58;
            [1,2,3,4].forEach(i => {
                if (isOk(state[`v${i}`]) && !isOk(prevStates[`v${i}`])) {
                    playTone(880, 'sine', 0.03, 0.3); // Nota aguda de sucesso parcial
                }
            });

            check();
        }

        function render() {
            [1,2,3,4].forEach(i => {
                const bar = document.getElementById(`bar-${i}`);
                const val = state[`v${i}`];
                bar.style.height = val + '%';
                
                if (val >= 42 && val <= 58) {
                    bar.style.background = '#fff';
                    bar.style.boxShadow = '0 0 15px #fff';
                } else {
                    bar.style.background = '';
                    bar.style.boxShadow = '';
                }
            });
        }

        function check() {
            const ok = (v) => v >= 42 && v <= 58;
            if (ok(state.v1) && ok(state.v2) && ok(state.v3) && ok(state.v4)) {
                document.querySelectorAll('.metal-btn').forEach(b => b.disabled = true);
                
                document.getElementById('led-text').innerText = "SINCRONIZADO";
                document.getElementById('led-text').classList.replace('text-yellow-600', 'text-green-500');
                document.getElementById('led-bulb').classList.replace('bg-yellow-600', 'bg-green-500');
                document.getElementById('led-bulb').classList.remove('animate-pulse');

                playSuccessSequence();

                setTimeout(() => {
                    document.getElementById('game-view').classList.add('hidden');
                    document.getElementById('game-subtext').classList.add('hidden');
                    document.getElementById('success-view').classList.remove('hidden');
                }, 800);
            }
        }

        function finalizar() {
            playTone(1200, 'sine', 0.1, 0.1);
            window.parent.postMessage({ 
                tipo: 'puzzleResolvido', 
                puzzleId: 'biodome' 
            }, '*');
        }

        render();
    </script>
</body>
</html>
