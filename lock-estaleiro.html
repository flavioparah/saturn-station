<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estaleiro - Override de Segurança</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #4ade80;
            --neon-dim: rgba(74, 222, 128, 0.2);
            --bg: #1a1a1a;
            --locked: #ff3e3e;
            --iron: #2c2c2e;
            --iron-light: #48484a;
            --glass: rgba(0, 15, 5, 0.95);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            
            /* Textura de Aço Escovado no Fundo Total */
            background: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),
                linear-gradient(
                    135deg,
                    #333 0%,
                    #1a1a1a 25%,
                    #444 50%,
                    #1a1a1a 75%,
                    #333 100%
                );
            background-blend-mode: overlay;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.02) 0px,
                rgba(255, 255, 255, 0.02) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 0;
        }

        .metal-plate {
            position: relative;
            width: 95vw;
            max-width: 500px;
            padding: 40px 25px;
            background: rgba(40, 40, 45, 0.4);
            border: 3px solid #444;
            border-radius: 4px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9), inset 1px 1px 2px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        .screw {
            position: absolute;
            width: 16px; height: 16px;
            background: radial-gradient(circle at 30% 30%, #555, #111);
            border-radius: 50%;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 2;
        }
        .screw::after {
            content: '';
            position: absolute;
            width: 70%; height: 2px;
            background: #000;
            top: 50%; left: 15%;
            transform: rotate(45deg);
        }
        .top-left { top: 15px; left: 15px; }
        .top-right { top: 15px; right: 15px; }
        .bottom-left { bottom: 15px; left: 15px; }
        .bottom-right { bottom: 15px; right: 15px; }

        .digital-screen {
            position: relative;
            width: 100%;
            background: var(--glass);
            border: 5px solid #000;
            border-radius: 2px;
            padding: 25px 15px;
            box-shadow: inset 0 0 40px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 440px;
        }

        .header { text-align: center; margin-bottom: 30px; z-index: 21; }
        .title { font-size: 22px; color: var(--locked); letter-spacing: 4px; margin: 0; text-shadow: 0 0 12px var(--locked); font-weight: 900; }
        .subtitle { font-family: 'Rajdhani', sans-serif; font-size: 12px; color: var(--neon); margin-top: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        .puzzle-wrapper { position: relative; }
        .top-target {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent;
            border-top: 16px solid var(--neon); filter: drop-shadow(0 0 10px var(--neon));
            z-index: 25; animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .lock-container {
            position: relative; width: 260px; height: 260px;
            background: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .ring {
            position: absolute; border-radius: 50%; border: 2px solid rgba(74, 222, 128, 0.08);
            cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center;
        }
        .ring:hover { border-color: var(--neon); box-shadow: inset 0 0 15px var(--neon-dim); }

        .marker {
            position: absolute; width: 8px; background: var(--locked);
            border-radius: 2px; box-shadow: 0 0 12px var(--locked);
            top: -6px; height: 38px;
        }

        #ring-outer { width: 240px; height: 240px; }
        #ring-middle { width: 170px; height: 170px; }
        #ring-inner { width: 100px; height: 100px; }

        .core {
            position: absolute; width: 32px; height: 32px; background: #000;
            border: 2px solid var(--locked); border-radius: 50%;
            box-shadow: 0 0 20px var(--locked); z-index: 15;
        }

        body.solved .title { color: var(--neon); text-shadow: 0 0 20px var(--neon); }
        body.solved .marker, body.solved .core { background: var(--neon); border-color: #fff; box-shadow: 0 0 20px var(--neon); }
        body.solved .ring { pointer-events: none; border-color: var(--neon-dim); }

        #btn-enter {
            margin-top: 30px; padding: 15px 40px; background: #000;
            border: 2px solid var(--neon); color: var(--neon);
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 14px;
            letter-spacing: 2px; cursor: pointer; display: none;
            box-shadow: 0 0 20px var(--neon-dim);
        }

        body.solved #btn-enter { display: block; animation: pulse 1.5s infinite; }
        #btn-enter:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="metal-plate">
        <div class="screw top-left"></div>
        <div class="screw top-right"></div>
        <div class="screw bottom-left"></div>
        <div class="screw bottom-right"></div>

        <div class="digital-screen">
            <div class="header">
                <div class="title" id="status-title">SYSTEM LOCKED</div>
                <div class="subtitle">AUTENTICAÇÃO DE ENGENHARIA REQUERIDA</div>
            </div>

            <div class="puzzle-wrapper">
                <div class="top-target"></div>
                <div class="lock-container">
                    <div class="ring" id="ring-outer" onclick="rotate('outer')"><div class="marker"></div></div>
                    <div class="ring" id="ring-middle" onclick="rotate('middle')"><div class="marker"></div></div>
                    <div class="ring" id="ring-inner" onclick="rotate('inner')"><div class="marker"></div></div>
                    <div class="core"></div>
                </div>
            </div>
        </div>

        <button id="btn-enter" onclick="completeOverride()">ACESSAR ESTALEIRO</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(f, d) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.frequency.value = f;
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        // Posições aleatórias iniciais (múltiplos de 45 graus)
        const state = {
            outer: (Math.floor(Math.random() * 7) + 1) * 45,
            middle: (Math.floor(Math.random() * 7) + 1) * 45,
            inner: (Math.floor(Math.random() * 7) + 1) * 45
        };

        // Lógica simplificada: Roda apenas o anel clicado
        function rotate(ring) {
            if (document.body.classList.contains('solved')) return;
            beep(280, 0.05);
            
            // Cada anel agora é independente
            state[ring] += 45;
            
            render();
            check();
        }

        function render() {
            document.getElementById('ring-outer').style.transform = `rotate(${state.outer}deg)`;
            document.getElementById('ring-middle').style.transform = `rotate(${state.middle}deg)`;
            document.getElementById('ring-inner').style.transform = `rotate(${state.inner}deg)`;
        }

        function check() {
            // Verifica se todos os anéis estão no topo (0, 360, 720...)
            if (state.outer % 360 === 0 && state.middle % 360 === 0 && state.inner % 360 === 0) {
                document.body.classList.add('solved');
                document.getElementById('status-title').innerText = "ACCESS GRANTED";
                beep(440, 0.2);
                setTimeout(() => beep(554, 0.3), 100);
            }
        }

        function completeOverride() {
            beep(880, 0.1);
            window.parent.postMessage({ tipo: 'puzzleResolvido', portal: 'estaleiro' }, '*');
        }
        
        render();
    </script>
</body>
</html>
