<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estaleiro - Override de Segurança</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #4ade80;
            --neon-dim: rgba(74, 222, 128, 0.2);
            --bg: #1a1a1a;
            --locked: #ff3e3e;
            --iron: #2c2c2e;
            --iron-light: #48484a;
            --glass: rgba(0, 20, 10, 0.85);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* CHAPA DE FERRO ESCOVADO */
        .metal-plate {
            position: relative;
            width: 90vw;
            max-width: 500px;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--iron) 0%, #111 50%, var(--iron) 100%);
            background-size: 4px 4px;
            border: 4px solid #3a3a3c;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 2px 2px 5px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        .screw {
            position: absolute;
            width: 15px; height: 15px;
            background: #3a3a3c;
            border-radius: 50%;
            box-shadow: inset 2px 2px 2px rgba(0,0,0,0.5);
        }
        .screw::after {
            content: '';
            position: absolute;
            width: 80%; height: 2px;
            background: #111;
            top: 50%; left: 10%;
            transform: rotate(45deg);
        }
        .top-left { top: 15px; left: 15px; }
        .top-right { top: 15px; right: 15px; }
        .bottom-left { bottom: 15px; left: 15px; }
        .bottom-right { bottom: 15px; right: 15px; }

        .digital-screen {
            position: relative;
            width: 100%;
            background: var(--glass);
            border: 10px solid #111;
            border-radius: 5px;
            padding: 30px 20px;
            box-shadow: inset 0 0 30px rgba(0,255,100,0.1);
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 420px;
        }

        .digital-screen::before {
            content: "";
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }

        .header { 
            text-align: center; 
            margin-bottom: 25px; 
            z-index: 21;
        }
        
        .title {
            font-size: 22px;
            font-weight: 900;
            color: var(--locked);
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--locked);
            margin: 0;
            transition: color 0.5s, text-shadow 0.5s;
        }

        .subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--neon);
            text-shadow: 0 0 5px var(--neon-dim);
            opacity: 0.9;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* CONTENTOR DO PUZZLE COM MARCADOR DE TOPO */
        .puzzle-wrapper {
            position: relative;
            padding-top: 20px;
        }

        /* MARCADOR DE TOPO (REFERÊNCIA FIXA) */
        .top-target {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid var(--neon);
            filter: drop-shadow(0 0 5px var(--neon));
            z-index: 25;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .lock-container {
            position: relative;
            width: 260px;
            height: 260px;
            background: #050505;
            border-radius: 50%;
            border: 4px solid #111;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(74, 222, 128, 0.05);
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
            display: flex;
            justify-content: center;
        }

        .ring:hover { border-color: var(--neon-dim); }

        .marker {
            position: absolute;
            width: 8px;
            background: var(--locked);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--locked);
            top: -5px;
            height: 35px;
            transition: background 0.5s, box-shadow 0.5s;
        }

        #ring-outer { width: 240px; height: 240px; }
        #ring-middle { width: 170px; height: 170px; }
        #ring-inner { width: 100px; height: 100px; }

        .core {
            position: absolute;
            width: 30px; height: 30px;
            background: #111;
            border: 2px solid var(--locked);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--locked);
            z-index: 15;
            transition: all 0.5s;
        }

        /* ESTADO RESOLVIDO */
        body.solved .title { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        body.solved .marker, body.solved .core { background: var(--neon); border-color: #fff; box-shadow: 0 0 15px var(--neon); }
        body.solved .ring { border-color: rgba(74, 222, 128, 0.2); pointer-events: none; }
        body.solved .top-target { border-top-color: #fff; animation: none; filter: drop-shadow(0 0 10px #fff); }

        #btn-enter {
            margin-top: 30px;
            padding: 15px 35px;
            background: #000;
            border: 2px solid var(--neon);
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            display: none;
            transition: 0.3s;
            z-index: 30;
        }

        body.solved #btn-enter { display: block; animation: pulse 1.5s infinite; }
        #btn-enter:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--neon); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px var(--neon); }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--neon); }
        }
    </style>
</head>
<body>

    <div class="metal-plate">
        <div class="screw top-left"></div>
        <div class="screw top-right"></div>
        <div class="screw bottom-left"></div>
        <div class="screw bottom-right"></div>

        <div class="digital-screen">
            <div class="header">
                <div class="title" id="status-title">SYSTEM LOCKED</div>
                <div class="subtitle">ALINHAR COM O MARCADOR SUPERIOR</div>
            </div>

            <div class="puzzle-wrapper">
                <!-- Marcador de referência visual no topo -->
                <div class="top-target"></div>
                
                <div class="lock-container">
                    <div class="ring" id="ring-outer" onclick="rotate('outer')">
                        <div class="marker"></div>
                    </div>
                    <div class="ring" id="ring-middle" onclick="rotate('middle')">
                        <div class="marker"></div>
                    </div>
                    <div class="ring" id="ring-inner" onclick="rotate('inner')">
                        <div class="marker"></div>
                    </div>
                    <div class="core"></div>
                </div>
            </div>
        </div>

        <button id="btn-enter" onclick="completeOverride()">ACESSAR ESTALEIRO</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function beep(f, d) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.frequency.value = f;
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        // Posições iniciais aleatórias (garantindo que não começam alinhadas)
        const state = {
            outer: (Math.floor(Math.random() * 7) + 1) * 45,
            middle: (Math.floor(Math.random() * 7) + 1) * 45,
            inner: (Math.floor(Math.random() * 7) + 1) * 45
        };

        function rotate(ring) {
            if (document.body.classList.contains('solved')) return;
            beep(300, 0.1);
            
            // Lógica de interdependência encadeada
            if (ring === 'outer') {
                state.outer += 45;
                state.middle += 45;
            } else if (ring === 'middle') {
                state.middle += 45;
                state.inner += 45;
            } else if (ring === 'inner') {
                state.inner += 45;
                state.outer += 45;
            }

            render();
            check();
        }

        function render() {
            document.getElementById('ring-outer').style.transform = `rotate(${state.outer}deg)`;
            document.getElementById('ring-middle').style.transform = `rotate(${state.middle}deg)`;
            document.getElementById('ring-inner').style.transform = `rotate(${state.inner}deg)`;
        }

        function check() {
            const isSolved = (state.outer % 360 === 0 && 
                              state.middle % 360 === 0 && 
                              state.inner % 360 === 0);

            if (isSolved) {
                document.body.classList.add('solved');
                document.getElementById('status-title').innerText = "ACCESS GRANTED";
                beep(600, 0.5);
            }
        }

        function completeOverride() {
            beep(800, 0.2);
            window.parent.postMessage('unlock_shipyard', '*');
        }

        render();
    </script>
</body>
</html>
